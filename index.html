<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>лЈЁнӢҙ нҠёлһҳм»Ө</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F0F2F5;
  --card: #FFFFFF;
  --text: #1A1A2E;
  --text-sub: #6B7280;
  --border: #E5E7EB;
  --accent: #4F46E5;
  --accent-light: #EEF2FF;
  --success: #10B981;
  --danger: #EF4444;
  --radius: 14px;
  --shadow: 0 2px 10px rgba(0,0,0,0.07);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ SCREENS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.screen {
  display: none;
  min-height: 100vh;
  align-items: center;
  justify-content: center;
  padding: 24px;
  flex-direction: column;
}
.screen.active { display: flex; }

.setup-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 32px;
  width: 100%;
  max-width: 500px;
  box-shadow: var(--shadow);
}
.setup-card h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.setup-card .sub { color: var(--text-sub); font-size: 14px; line-height: 1.6; margin-bottom: 24px; }

/* в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ FORM в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.fg { margin-bottom: 14px; }
.fg label { display: block; font-size: 12px; font-weight: 600; color: var(--text-sub); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .5px; }
.fg input, .fg textarea {
  width: 100%; padding: 11px 14px;
  border: 1.5px solid var(--border); border-radius: 10px;
  font-size: 14px; outline: none; transition: border-color .2s;
  background: #FAFAFA; color: var(--text); font-family: inherit;
}
.fg input:focus, .fg textarea:focus { border-color: var(--accent); background: white; }
.fg textarea { height: 110px; resize: none; font-size: 12px; font-family: 'Courier New', monospace; line-height: 1.6; }

/* в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ BUTTONS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.btn {
  padding: 11px 20px; border: none; border-radius: 10px;
  font-size: 14px; font-weight: 600; cursor: pointer;
  transition: all .2s; font-family: inherit;
}
.btn-primary { background: var(--accent); color: white; width: 100%; padding: 13px; font-size: 15px; }
.btn-primary:hover { background: #4338CA; }
.btn-ghost { background: transparent; color: var(--text-sub); }
.btn-ghost:hover { background: var(--border); color: var(--text); }
.btn-icon {
  width: 34px; height: 34px; border: none;
  background: transparent; border-radius: 8px;
  cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
  font-size: 16px; color: var(--text-sub); transition: background .2s; flex-shrink: 0;
}
.btn-icon:hover { background: var(--border); }

.warning-box {
  background: #FFF7ED; border: 1px solid #FED7AA; border-radius: 10px;
  padding: 14px; font-size: 12px; color: #92400E; line-height: 1.7;
  margin-bottom: 18px;
}
.warning-box code { background: rgba(0,0,0,.07); padding: 1px 4px; border-radius: 4px; font-size: 11px; }

/* в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ APP LAYOUT в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
#app { display: none; flex-direction: column; min-height: 100vh; max-width: 640px; margin: 0 auto; }

/* в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ HEADER в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
#header {
  background: var(--card); padding: 14px 18px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 10;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
#header h1 { font-size: 17px; font-weight: 700; }
.date-text { font-size: 12px; color: var(--text-sub); margin-top: 2px; }

/* в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ TAB BAR в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
#tab-bar {
  background: var(--card); border-bottom: 1px solid var(--border);
  padding: 0 8px; display: flex; overflow-x: auto; scrollbar-width: none;
  gap: 2px; align-items: stretch;
}
#tab-bar::-webkit-scrollbar { display: none; }

.tab-btn {
  padding: 13px 15px; border: none; background: transparent;
  font-size: 14px; font-weight: 500; color: var(--text-sub);
  cursor: pointer; white-space: nowrap;
  border-bottom: 2.5px solid transparent; transition: all .2s;
  font-family: inherit; display: flex; align-items: center; gap: 5px;
}
.tab-btn.active { font-weight: 700; }
.tab-add-btn {
  padding: 10px 12px; border: none; background: transparent;
  color: var(--text-sub); cursor: pointer; font-size: 22px;
  font-family: inherit; flex-shrink: 0; display: flex; align-items: center;
  margin-left: auto;
}
.tab-add-btn:hover { color: var(--accent); }

/* в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ CONTENT в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
#content { flex: 1; padding: 14px; display: flex; flex-direction: column; gap: 10px; }

/* в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ TAB HEADER в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.tab-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 2px;
}
.tab-header h2 { font-size: 17px; font-weight: 700; }
.tab-header-actions { display: flex; gap: 2px; }

/* в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ PROGRESS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.progress-card {
  background: var(--card); border-radius: var(--radius); padding: 14px 16px;
  box-shadow: var(--shadow);
}
.progress-label {
  font-size: 13px; color: var(--text-sub); margin-bottom: 8px;
  display: flex; justify-content: space-between; align-items: center;
}
.progress-label span:last-child { font-weight: 700; font-size: 14px; color: var(--text); }
.progress-bar { height: 7px; background: var(--border); border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--success); border-radius: 4px; transition: width .4s ease; }

/* в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ ROUTINE LIST в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.routine-list { display: flex; flex-direction: column; gap: 7px; }

.routine-item {
  background: var(--card); border-radius: 12px;
  padding: 13px 14px; display: flex; align-items: center; gap: 11px;
  box-shadow: var(--shadow); transition: opacity .25s, transform .15s;
  user-select: none;
}
.routine-item.checked { opacity: .55; }
.routine-item:active { transform: scale(.99); }

.r-check {
  width: 24px; height: 24px; border: 2px solid var(--border);
  border-radius: 50%; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s; background: white;
}
.r-check.checked { background: var(--success); border-color: var(--success); color: white; }
.r-check.checked::after { content: 'вң“'; font-size: 13px; font-weight: 800; }
.edit-mode .r-check { pointer-events: none; opacity: .5; }

.r-name { flex: 1; font-size: 15px; line-height: 1.4; }
.routine-item.checked .r-name { text-decoration: line-through; color: var(--text-sub); }

.r-del {
  width: 28px; height: 28px; border: none; background: #FEE2E2;
  color: var(--danger); border-radius: 7px; cursor: pointer;
  font-size: 15px; display: none; align-items: center; justify-content: center;
  font-weight: 700; flex-shrink: 0;
}
.edit-mode .r-del { display: flex; }

.r-time {
  font-size: 11px; color: var(--text-sub); background: var(--bg);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 3px 8px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
  font-family: 'Courier New', monospace; display: inline-flex; align-items: center;
}
.r-time:hover { border-color: var(--accent); color: var(--accent); }
.edit-mode .r-time { display: none; }

.r-goal {
  font-size: 10px; font-weight: 600; color: #8B5CF6;
  background: #EDE9FE; border-radius: 99px;
  padding: 2px 7px; white-space: nowrap; flex-shrink: 0; cursor: pointer;
}
.r-goal:hover { background: #DDD6FE; }

.r-edit {
  width: 26px; height: 26px; border: none; background: #EFF6FF;
  color: #3B82F6; border-radius: 6px; cursor: pointer;
  font-size: 13px; display: none; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.edit-mode .r-edit { display: flex; }

.r-move {
  display: none; flex-direction: column; gap: 1px; flex-shrink: 0;
}
.edit-mode .r-move { display: flex; }
.r-move button {
  width: 22px; height: 18px; border: none; background: var(--bg);
  border-radius: 4px; cursor: pointer; font-size: 10px; color: var(--text-sub);
  display: flex; align-items: center; justify-content: center; padding: 0;
}
.r-move button:hover { background: var(--border); color: var(--text); }

.add-routine-btn {
  background: var(--card); border: 1.5px dashed var(--border);
  border-radius: 12px; padding: 13px 16px; width: 100%;
  text-align: left; font-size: 14px; color: var(--text-sub);
  cursor: pointer; font-family: inherit; transition: all .2s;
}
.add-routine-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

/* в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ STREAK в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.streak-card {
  background: var(--card); border-radius: var(--radius);
  padding: 16px; box-shadow: var(--shadow);
}
.streak-card h3 { font-size: 13px; font-weight: 600; color: var(--text-sub); margin-bottom: 14px; letter-spacing: .3px; }
.streak-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
.streak-col { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.streak-label { font-size: 11px; font-weight: 600; }
.streak-date { font-size: 10px; color: var(--text-sub); }
.streak-dot {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--border); display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; transition: all .3s;
}
.streak-dot.today { box-shadow: 0 0 0 2.5px var(--accent); }
.streak-dot.future { opacity: .25; }
.streak-dot.full { background: var(--success); color: white; }
.streak-dot.high { background: #6EE7B7; color: #065F46; }
.streak-dot.mid { background: #FCD34D; color: #78350F; }
.streak-dot.low { background: #FCA5A5; color: #7F1D1D; }

/* в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ EMPTY STATE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.empty-state { text-align: center; padding: 48px 24px; color: var(--text-sub); }
.empty-state .ei { font-size: 44px; margin-bottom: 10px; }
.empty-state p { font-size: 14px; line-height: 1.6; }

/* в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ SUCCESS BANNER в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.success-banner {
  background: linear-gradient(135deg, #10B981, #059669);
  color: white; border-radius: var(--radius);
  padding: 18px 20px; text-align: center;
  font-size: 18px; font-weight: 700;
  box-shadow: 0 4px 16px rgba(16,185,129,.35);
  animation: pop .4s cubic-bezier(.175,.885,.32,1.275);
}
@keyframes pop {
  0% { transform: scale(.92); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
.success-banner .s-sub {
  font-size: 13px; font-weight: 400; opacity: .85; margin-top: 4px;
}

/* в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ DATE NAV в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.date-nav { display: flex; align-items: center; gap: 6px; }
.date-nav-btn {
  width: 28px; height: 28px; border: none; background: var(--bg);
  border-radius: 8px; cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-sub);
}
.date-nav-btn:hover { background: var(--border); }
.date-nav-btn:disabled { opacity: .3; cursor: default; }
.past-badge {
  font-size: 11px; background: #FEF3C7; color: #92400E;
  border-radius: 99px; padding: 2px 8px; font-weight: 600;
}

/* в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ DRAG в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.r-drag {
  display: none; color: var(--text-sub); cursor: grab; font-size: 16px;
  padding: 0 2px; flex-shrink: 0; user-select: none;
}
.edit-mode .r-drag { display: flex; align-items: center; }
.routine-item.dragging { opacity: .35; }
.routine-item.drag-over { outline: 2px solid var(--accent); outline-offset: -2px; border-radius: 12px; }

/* в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ STREAK BADGE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.tab-btn .tab-done { font-size: 12px; }
.streak-header {
  display: flex; align-items: center; gap: 4px;
  margin-bottom: 14px;
}
.streak-header h3 { font-size: 13px; font-weight: 600; color: var(--text-sub); flex: 1; }
.streak-count {
  font-size: 12px; font-weight: 700; color: var(--success);
  background: #D1FAE5; padding: 3px 10px; border-radius: 99px;
}

/* в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ MODAL в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45);
  z-index: 100; align-items: center; justify-content: center; padding: 20px;
}
.overlay.active { display: flex; }
.modal {
  background: var(--card); border-radius: var(--radius);
  padding: 24px; width: 100%; max-width: 420px;
  box-shadow: 0 16px 48px rgba(0,0,0,.15);
}
.modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
.modal-actions { display: flex; gap: 8px; margin-top: 20px; }
.modal-actions .btn { flex: 1; }

.emoji-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; margin: 10px 0; }
.emoji-btn {
  padding: 7px; border: 1.5px solid transparent; border-radius: 8px;
  font-size: 20px; cursor: pointer; background: var(--bg); transition: all .15s;
}
.emoji-btn:hover, .emoji-btn.sel { border-color: var(--accent); background: var(--accent-light); }

.color-row { display: flex; gap: 9px; flex-wrap: wrap; margin: 10px 0; }
.color-btn {
  width: 30px; height: 30px; border-radius: 50%;
  border: 3px solid transparent; cursor: pointer; transition: transform .15s;
}
.color-btn:hover { transform: scale(1.15); }
.color-btn.sel { border-color: var(--text); transform: scale(1.1); }

/* в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ CONTEXT MENU в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.ctx {
  position: fixed; background: var(--card); border-radius: 12px;
  box-shadow: 0 8px 28px rgba(0,0,0,.15); padding: 6px;
  z-index: 200; min-width: 160px; display: none;
}
.ctx button {
  display: flex; align-items: center; gap: 9px; width: 100%;
  padding: 10px 13px; border: none; background: transparent;
  font-size: 14px; text-align: left; cursor: pointer;
  border-radius: 7px; font-family: inherit; color: var(--text);
}
.ctx button:hover { background: var(--bg); }
.ctx button.danger { color: var(--danger); }
.ctx hr { border: none; border-top: 1px solid var(--border); margin: 4px 0; }

/* в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ TOAST в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
#toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(70px);
  background: #1A1A2E; color: white;
  padding: 11px 22px; border-radius: 99px;
  font-size: 14px; font-weight: 500; z-index: 300;
  transition: transform .3s ease; pointer-events: none; white-space: nowrap;
}
#toast.show { transform: translateX(-50%) translateY(0); }

.divider { height: 1px; background: var(--border); margin: 14px 0; }

@media (max-width: 480px) {
  .setup-card { padding: 22px 16px; }
  .streak-dot { width: 30px; height: 30px; font-size: 10px; }
}

/* в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ STATS MODAL в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.stats-tab-row { display: flex; gap: 8px; margin-bottom: 16px; }
.stats-tab-btn {
  flex: 1; padding: 8px; border: 1.5px solid var(--border);
  border-radius: 8px; background: transparent; font-size: 13px;
  font-weight: 600; cursor: pointer; font-family: inherit; color: var(--text-sub);
  transition: all .15s;
}
.stats-tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

.stats-dots { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin: 10px 0 6px; }
.stats-dot { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.stats-dot-circle {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--border); transition: background .2s;
}
.stats-dot-circle.done { background: var(--success); }
.stats-dot-circle.today { box-shadow: 0 0 0 2px var(--accent); }

const COLORS = ['#4F46E5','#10B981','#F59E0B','#EF4444','#8B5CF6','#06B6D4','#F97316','#EC4899','#14B8A6','#84CC16'];
const DAY_KO = ['мқј','мӣ”','нҷ”','мҲҳ','лӘ©','кёҲ','нҶ '];

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// LAUNCH APP
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function launchApp() {
  document.getElementById('login-screen').classList.remove('active');
  document.getElementById('app').style.display = 'flex';
  viewDate = todayStr();
  streakWeekAnchor = todayStr();
  updateDateText();
  startListeners();
}

function navigateDate(dir) {
  const d = new Date(viewDate + 'T00:00:00');
  d.setDate(d.getDate() + dir);
  const next = `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
  if (next > todayStr()) return;
  viewDate = next;
  updateDateText();
  subscribeChecks();
  renderContent();
}

function navigateStreakWeek(dir) {
  const d = new Date(streakWeekAnchor + 'T00:00:00');
  d.setDate(d.getDate() + dir * 7);
  const next = `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
  if (next > todayStr()) return;
  streakWeekAnchor = next;
  refreshWeekListeners();
}

function startListeners() {
  const u1 = col('tabs').orderBy('order').onSnapshot(snap => {
    tabs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (!currentTabId && tabs.length > 0) currentTabId = tabs[0].id;
    if (currentTabId && !tabs.find(t => t.id === currentTabId)) {
      currentTabId = tabs.length > 0 ? tabs[0].id : null;
    }
    renderTabs();
    startRoutineListener();
  });

  unsubs.push(u1);
  subscribeChecks();
  startWeekListeners();
}

function subscribeChecks() {
  if (checkUnsub) checkUnsub();
  checkUnsub = col('checks').doc(viewDate).onSnapshot(doc => {
    todayChecks = doc.exists ? (doc.data() || {}) : {};
    renderContent();
  });
}

function startRoutineListener() {
  if (routineUnsub) routineUnsub();
  routineUnsub = col('routines').onSnapshot(snap => {
    routines = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderContent();
  });
}

function startWeekListeners() {
  getWeekOf(streakWeekAnchor).forEach(date => {
    const u = col('checks').doc(date).onSnapshot(doc => {
      weekChecks[date] = doc.exists ? (doc.data() || {}) : {};
      rerenderStreak();
    });
    weekUnsubs.push(u);
  });
}

function refreshWeekListeners() {
  weekUnsubs.forEach(u => u());
  weekUnsubs = [];
  weekChecks = {};
  startWeekListeners();
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// DATE HELPERS
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
}
function p2(n) { return String(n).padStart(2,'0'); }
function getWeekOf(dateStr) {
  const d = new Date((dateStr || todayStr()) + 'T00:00:00');
  const dow = d.getDay();
  const daysToMon = dow === 0 ? 6 : dow - 1;
  const monday = new Date(d);
  monday.setDate(d.getDate() - daysToMon);
  return Array.from({length:7}, (_,i) => {
    const day = new Date(monday);
    day.setDate(monday.getDate() + i);
    return `${day.getFullYear()}-${p2(day.getMonth()+1)}-${p2(day.getDate())}`;
  });
}
function updateDateText() {
  const d = new Date((viewDate || todayStr()) + 'T00:00:00');
  const isToday = (viewDate || todayStr()) === todayStr();
  const el = document.getElementById('date-text');
  if (el) el.innerHTML = `${d.getMonth()+1}мӣ” ${d.getDate()}мқј (${DAY_KO[d.getDay()]})${isToday ? '' : ' <span class="past-badge">кіјкұ°</span>'}`;
  const btnNext = document.getElementById('btn-next');
  if (btnNext) btnNext.disabled = isToday;
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// RENDER TABS
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function renderTabs() {
  const bar = document.getElementById('tab-bar');
  const addBtn = bar.querySelector('.tab-add-btn');
  bar.querySelectorAll('.tab-btn').forEach(el => el.remove());

  tabs.forEach(tab => {
    const tabRoutines = routines.filter(r => r.tabId === tab.id);
    const allDone = tabRoutines.length > 0 && tabRoutines.every(r => todayChecks[r.id]);

    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (tab.id === currentTabId ? ' active' : '');
    btn.innerHTML = `${tab.emoji || 'рҹ“Ң'} ${esc(tab.name)}${allDone ? ' <span class="tab-done">вң…</span>' : ''}`;
    const c = tab.color || '#4F46E5';
    if (tab.id === currentTabId) {
      btn.style.color = c;
      btn.style.borderBottomColor = c;
    }
    btn.onclick = () => selectTab(tab.id);
    btn.oncontextmenu = e => { e.preventDefault(); showCtxMenu(e, tab); };
    btn.title = 'мҡ°нҒҙлҰӯ: нҺём§‘/мӮӯм ң';
    bar.insertBefore(btn, addBtn);
  });
}

function selectTab(id) {
  currentTabId = id;
  editMode = false;
  renderTabs();
  renderContent();
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// RENDER CONTENT
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function renderContent() {
  const container = document.getElementById('content');
  if (!currentTabId) {
    container.innerHTML = `<div class="empty-state" onclick="openAddTab()" style="cursor:pointer"><div class="ei">рҹ“Ӣ</div><p>м—¬кё°лҘј лҲҢлҹ¬<br>мІ« нғӯмқ„ м¶”к°Җн•ҳм„ёмҡ”!</p></div>`;
    return;
  }
  const tab = tabs.find(t => t.id === currentTabId);
  if (!tab) return;

  const tabRoutines = routines
    .filter(r => r.tabId === currentTabId)
    .sort((a,b) => (a.order||0) - (b.order||0));

  const checked = tabRoutines.filter(r => todayChecks[r.id]).length;
  const total = tabRoutines.length;
  const pct = total > 0 ? Math.round(checked/total*100) : 0;
  const color = tab.color || '#4F46E5';

  let html = `
    <div class="tab-header">
      <h2 style="color:${color}">${tab.emoji||''} ${esc(tab.name)}</h2>
      <div class="tab-header-actions">
        <button class="btn-icon" onclick="toggleEditMode()" title="${editMode?'нҺём§‘ мҷ„лЈҢ':'лЈЁнӢҙ нҺём§‘'}">${editMode?'вң…':'вңҸпёҸ'}</button>
        <button class="btn-icon" onclick="showCtxMenuByBtn(event, ${tabs.indexOf(tab)})" title="нғӯ мҳөм…ҳ">вӢҜ</button>
      </div>
    </div>
  `;

  if (total > 0) {
    const fc = pct === 100 ? 'var(--success)' : (pct >= 50 ? '#F59E0B' : '#6B7280');
    if (pct === 100) {
      const streak = calcStreak(currentTabId);
      html += `
        <div class="success-banner">
          рҹҺү ${esc(tab.name)} мҷ„м„ұ!
          <div class="s-sub">${streak > 1 ? `рҹ”Ҙ ${streak}мқј м—°мҶҚ лӢ¬м„ұ мӨ‘!` : 'мҳӨлҠҳ лӘЁл“  лЈЁнӢҙмқ„ мҷ„лЈҢн–Ҳм–ҙмҡ”!'}</div>
        </div>
      `;
    } else {
      html += `
        <div class="progress-card">
          <div class="progress-label">
            <span>мҳӨлҠҳ м§„н–үлҘ </span>
            <span style="color:${fc}">${checked}/${total} (${pct}%)</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" style="width:${pct}%;background:${fc}"></div>
          </div>
        </div>
      `;
    }
  }

  html += `<div class="routine-list ${editMode?'edit-mode':''}">`;

  if (tabRoutines.length === 0) {
    html += `<div class="empty-state" style="padding:32px 0"><div class="ei">рҹҢұ</div><p>м•„лһҳ лІ„нҠјмңјлЎң лЈЁнӢҙмқ„ м¶”к°Җн•ҳм„ёмҡ”</p></div>`;
  } else {
    tabRoutines.forEach((r) => {
      const isChecked = !!todayChecks[r.id];
      const timeVal = todayChecks[r.id + '_t'] || '';
      const goal = r.goal || 7;
      const goalLabel = goal === 7 ? 'л§Өмқј' : `мЈј ${goal}нҡҢ`;
      const timeBadge = isChecked
        ? `<span class="r-time" onclick="editTime('${r.id}')">${timeVal || '+ мӢңк°„'}</span>`
        : '';
      html += `
        <div class="routine-item${isChecked?' checked':''}"
          draggable="${editMode}"
          ondragstart="dragStart(event,'${r.id}')"
          ondragover="dragOver(event,'${r.id}')"
          ondragleave="dragLeave(event)"
          ondrop="dragDrop(event,'${r.id}')">
          <span class="r-drag">в ҝ</span>
          <div class="r-check${isChecked?' checked':''}" onclick="toggleCheck('${r.id}')"></div>
          <span class="r-name${editMode?'':' r-name-clickable'}" ${editMode?'':` onclick="openRoutineStats('${r.id}','${esc(r.name)}')" title="нҶөкі„ ліҙкё°"`}>${esc(r.name)}</span>
          ${timeBadge}
          ${r.timeStart ? `<span class="r-schedule">${r.timeStart}${r.timeEnd?'~'+r.timeEnd:''}</span>` : ''}
          <span class="r-goal" onclick="setGoal('${r.id}',${goal})">${goalLabel}</span>
          <button class="r-edit" onclick="openRoutineSettings('${r.id}','${esc(r.name)}','${r.timeStart||''}','${r.timeEnd||''}')" title="лЈЁнӢҙ м„Өм •">вңҸпёҸ</button>
          <button class="r-del" onclick="deleteRoutine('${r.id}')">вң•</button>
        </div>
      `;
    });
  }

  html += `</div>`;

  if (!editMode) {
    html += `<button class="add-routine-btn" onclick="openAddRoutine()">пјӢ лЈЁнӢҙ м¶”к°Җ</button>`;
  }

  html += buildStreakHTML();
  container.innerHTML = html;
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// RENDER STREAK
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
const DAY_MON = ['мӣ”','нҷ”','мҲҳ','лӘ©','кёҲ','нҶ ','мқј'];

function buildStreakHTML() {
  const dates = getWeekOf(streakWeekAnchor);
  const tod = todayStr();
  const tabRoutines = routines.filter(r => r.tabId === currentTabId);
  const total = tabRoutines.length;

  const streak = calcStreak(currentTabId);
  const streakLabel = streak > 0 ? `рҹ”Ҙ ${streak}мқј м—°мҶҚ` : '';
  const isThisWeek = getWeekOf(streakWeekAnchor).join(',') === getWeekOf(todayStr()).join(',');
  const weekTitle = isThisWeek ? 'мқҙлІҲ мЈј' : `${dates[0].slice(5).replace('-','/')} ~ ${dates[6].slice(5).replace('-','/')}`;

  let html = `<div class="streak-card">
    <div class="streak-header">
      <button class="stats-nav-btn" onclick="navigateStreakWeek(-1)" style="margin-right:4px">вҖ№</button>
      <h3 style="flex:1">рҹ“… ${weekTitle}</h3>
      ${streakLabel ? `<span class="streak-count">${streakLabel}</span>` : ''}
      <button class="stats-nav-btn" onclick="navigateStreakWeek(1)" style="margin-left:4px" ${isThisWeek?'disabled':''}>вҖә</button>
    </div>
    <div class="streak-row">`;

  dates.forEach((date, idx) => {
    const d = new Date(date + 'T00:00:00');
    const dayLabel = DAY_MON[idx];
    const dateNum = d.getDate();
    const isFuture = date > tod;
    const isToday = date === tod;
    const checks = weekChecks[date] || {};

    let cls = 'streak-dot';
    let content = '';

    if (!isFuture && total > 0) {
      const cnt = tabRoutines.filter(r => checks[r.id]).length;
      const pct = cnt / total;
      content = cnt > 0 ? String(cnt) : '';
      if (pct === 1) cls += ' full';
      else if (pct >= 0.7) cls += ' high';
      else if (pct >= 0.3) cls += ' mid';
      else if (pct > 0) cls += ' low';
    }
    if (isToday) cls += ' today';
    if (isFuture) cls += ' future';

    html += `
      <div class="streak-col">
        <div class="streak-label" style="font-weight:${isToday?'700':'500'};color:${isToday?'var(--accent)':'var(--text-sub)'}">${dayLabel}</div>
        <div class="${cls}">${content}</div>
        <div class="streak-date">${dateNum}</div>
      </div>`;
  });

  html += `</div></div>`;
  return html;
}

function calcStreak(tabId) {
  const dates = getWeekOf(streakWeekAnchor);
  const tod = todayStr();
  const tabRoutines = routines.filter(r => r.tabId === tabId);
  if (tabRoutines.length === 0) return 0;

  let streak = 0;
  const past = dates.filter(d => d <= tod).reverse();
  for (const date of past) {
    const checks = weekChecks[date] || {};
    const allDone = tabRoutines.every(r => checks[r.id]);
    if (allDone) streak++;
    else break;
  }
  return streak;
}

function rerenderStreak() {
  const container = document.getElementById('content');
  const existing = container.querySelector('.streak-card');
  if (existing) existing.outerHTML = buildStreakHTML();
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// CHECK TOGGLE
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function toggleCheck(routineId) {
  if (editMode) return;
  const newVal = !todayChecks[routineId];
  const now = new Date();
  const timeStr = `${p2(now.getHours())}:${p2(now.getMinutes())}`;
  todayChecks[routineId] = newVal;
  if (newVal) todayChecks[routineId + '_t'] = timeStr;
  else delete todayChecks[routineId + '_t'];
  const update = { [routineId]: newVal };
  if (newVal) update[routineId + '_t'] = timeStr;
  else update[routineId + '_t'] = firebase.firestore.FieldValue.delete();
  col('checks').doc(viewDate).set(update, { merge: true });
  renderContent();
}

function editTime(routineId) {
  const cur = todayChecks[routineId + '_t'] || '';
  const t = prompt('мҷ„лЈҢ мӢңк°„мқ„ мһ…л Ҙн•ҳм„ёмҡ” (мҳҲ: 09:30)', cur);
  if (t === null) return;
  const valid = /^\d{1,2}:\d{2}$/.test(t.trim());
  if (!valid) { toast('мҳ¬л°”лҘё нҳ•мӢқмқҙ м•„лӢҷлӢҲлӢӨ (мҳҲ: 09:30)'); return; }
  todayChecks[routineId + '_t'] = t.trim();
  col('checks').doc(viewDate).set({ [routineId + '_t']: t.trim() }, { merge: true });
  renderContent();
}

function toggleEditMode() {
  editMode = !editMode;
  renderContent();
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// TAB CRUD
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function openAddTab() {
  editTabId = null;
  selEmoji = 'вҳҖпёҸ'; selColor = '#4F46E5';
  document.getElementById('tab-modal-title').textContent = 'нғӯ м¶”к°Җ';
  document.getElementById('tab-name').value = '';
  updatePickers();
  openModal('tab-modal');
  setTimeout(() => document.getElementById('tab-name').focus(), 80);
}

function openEditTab() {
  if (!ctxTab) return;
  editTabId = ctxTab.id;
  selEmoji = ctxTab.emoji || 'рҹ“Ң';
  selColor = ctxTab.color || '#4F46E5';
  document.getElementById('tab-modal-title').textContent = 'нғӯ нҺём§‘';
  document.getElementById('tab-name').value = ctxTab.name;
  updatePickers();
  openModal('tab-modal');
  setTimeout(() => document.getElementById('tab-name').focus(), 80);
}

async function saveTab() {
  const name = document.getElementById('tab-name').value.trim();
  if (!name) { toast('нғӯ мқҙлҰ„мқ„ мһ…л Ҙн•ҳм„ёмҡ”'); return; }

  if (editTabId) {
    await col('tabs').doc(editTabId).update({ name, emoji: selEmoji, color: selColor });
    toast('нғӯмқҙ мҲҳм •лҗҳм—ҲмҠөлӢҲлӢӨ');
  } else {
    const ref = await col('tabs').add({ name, emoji: selEmoji, color: selColor, order: tabs.length });
    currentTabId = ref.id;
    toast('нғӯмқҙ м¶”к°Җлҗҳм—ҲмҠөлӢҲлӢӨ');
  }
  closeModal('tab-modal');
}

async function deleteTab() {
  if (!ctxTab) return;
  if (!confirm(`"${ctxTab.name}" нғӯкіј лӘЁл“  лЈЁнӢҙмқ„ мӮӯм ңн• к№Ңмҡ”?`)) return;

  const rSnap = await col('routines').where('tabId','==',ctxTab.id).get();
  const batch = db.batch();
  rSnap.docs.forEach(d => batch.delete(d.ref));
  batch.delete(col('tabs').doc(ctxTab.id));
  await batch.commit();

  if (currentTabId === ctxTab.id) currentTabId = null;
  toast('нғӯмқҙ мӮӯм ңлҗҳм—ҲмҠөлӢҲлӢӨ');
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// ROUTINE CRUD
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function openAddRoutine() {
  document.getElementById('routine-name').value = '';
  openModal('routine-modal');
  setTimeout(() => document.getElementById('routine-name').focus(), 80);
}

async function saveRoutine() {
  const name = document.getElementById('routine-name').value.trim();
  if (!name) { toast('лЈЁнӢҙ мқҙлҰ„мқ„ мһ…л Ҙн•ҳм„ёмҡ”'); return; }
  if (!currentTabId) return;

  const n = routines.filter(r => r.tabId === currentTabId).length;
  await col('routines').add({ name, tabId: currentTabId, order: n });
  closeModal('routine-modal');
  toast('лЈЁнӢҙмқҙ м¶”к°Җлҗҳм—ҲмҠөлӢҲлӢӨ');
}

function dragStart(e, id) {
  dragSrcId = id;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => e.target.closest('.routine-item').classList.add('dragging'), 0);
}
function dragOver(e, id) {
  e.preventDefault();
  document.querySelectorAll('.routine-item').forEach(el => el.classList.remove('drag-over'));
  if (dragSrcId !== id) e.target.closest('.routine-item')?.classList.add('drag-over');
}
function dragLeave(e) {
  e.target.closest('.routine-item')?.classList.remove('drag-over');
}
async function dragDrop(e, targetId) {
  e.preventDefault();
  document.querySelectorAll('.routine-item').forEach(el => {
    el.classList.remove('drag-over'); el.classList.remove('dragging');
  });
  if (!dragSrcId || dragSrcId === targetId) { dragSrcId = null; return; }
  const tabRoutines = routines
    .filter(r => r.tabId === currentTabId)
    .sort((a,b) => (a.order||0) - (b.order||0));
  const fromIdx = tabRoutines.findIndex(r => r.id === dragSrcId);
  const toIdx   = tabRoutines.findIndex(r => r.id === targetId);
  const reordered = [...tabRoutines];
  const [moved] = reordered.splice(fromIdx, 1);
  reordered.splice(toIdx, 0, moved);
  const batch = db.batch();
  reordered.forEach((r, i) => batch.update(col('routines').doc(r.id), { order: i }));
  await batch.commit();
  dragSrcId = null;
}

function openRoutineSettings(id, name, timeStart, timeEnd) {
  settingRoutineId = id;
  document.getElementById('rs-name').value = name;
  document.getElementById('rs-start').value = timeStart || '';
  document.getElementById('rs-end').value = timeEnd || '';
  openModal('routine-settings-modal');
  setTimeout(() => document.getElementById('rs-name').focus(), 80);
}

async function saveRoutineSettings() {
  const name = document.getElementById('rs-name').value.trim();
  if (!name) { toast('лЈЁнӢҙ мқҙлҰ„мқ„ мһ…л Ҙн•ҳм„ёмҡ”'); return; }
  const timeStart = document.getElementById('rs-start').value;
  const timeEnd = document.getElementById('rs-end').value;
  const update = { name };
  update.timeStart = timeStart || firebase.firestore.FieldValue.delete();
  update.timeEnd = timeEnd || firebase.firestore.FieldValue.delete();
  await col('routines').doc(settingRoutineId).update(update);
  closeModal('routine-settings-modal');
  toast('лЈЁнӢҙ м„Өм •мқҙ м ҖмһҘлҗҳм—ҲмҠөлӢҲлӢӨ');
}

async function moveRoutine(id, dir) {
  const tabRoutines = routines
    .filter(r => r.tabId === currentTabId)
    .sort((a,b) => (a.order||0) - (b.order||0));
  const idx = tabRoutines.findIndex(r => r.id === id);
  const swapIdx = idx + dir;
  if (swapIdx < 0 || swapIdx >= tabRoutines.length) return;
  const batch = db.batch();
  batch.update(col('routines').doc(tabRoutines[idx].id), { order: swapIdx });
  batch.update(col('routines').doc(tabRoutines[swapIdx].id), { order: idx });
  await batch.commit();
}

async function setGoal(id, current) {
  const input = prompt('мЈјк°„ лӘ©н‘ң нҡҹмҲҳлҘј мһ…л Ҙн•ҳм„ёмҡ” (1~7)\n7=л§Өмқј, 5=мЈј5нҡҢ, 3=мЈј3нҡҢ вҖҰ', current);
  if (input === null) return;
  const n = parseInt(input);
  if (isNaN(n) || n < 1 || n > 7) { toast('1~7 мӮ¬мқҙ мҲ«мһҗлҘј мһ…л Ҙн•ҳм„ёмҡ”'); return; }
  await col('routines').doc(id).update({ goal: n });
  toast('лӘ©н‘ңк°Җ м„Өм •лҗҳм—ҲмҠөлӢҲлӢӨ');
}

async function deleteRoutine(id) {
  await col('routines').doc(id).delete();
  // also clean up checks
  const dateSnap = await col('checks').get();
  const batch = db.batch();
  dateSnap.docs.forEach(doc => {
    if (doc.data()[id] !== undefined) {
      batch.update(doc.ref, { [id]: firebase.firestore.FieldValue.delete() });
    }
  });
  await batch.commit();
  toast('лЈЁнӢҙмқҙ мӮӯм ңлҗҳм—ҲмҠөлӢҲлӢӨ');
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function getMonthDates(year, month) {
  const last = new Date(year, month, 0).getDate();
  return Array.from({length: last}, (_, i) => `${year}-${p2(month)}-${p2(i+1)}`);
}

async function loadStatsForDates(dates) {
  const missing = dates.filter(d => statsCache[d] === undefined);
  if (missing.length === 0) return;
  await Promise.all(missing.map(async date => {
    const doc = await col('checks').doc(date).get();
    statsCache[date] = doc.exists ? (doc.data() || {}) : {};
  }));
}

async function openRoutineStats(routineId, routineName) {
  statsRoutineId = routineId;
  statsTab = 'week';
  statsWeekAnchor = viewDate;
  const [y, m] = todayStr().split('-').map(Number);
  statsMonthYear = y; statsMonthMonth = m;
  statsCache = {};

  document.getElementById('stats-title').textContent = routineName + ' нҶөкі„';

async function switchStatsTab(tab) {

  document.getElementById('stab-month').classList.toggle('active', tab === 'month');
  document.getElementById('stats-content').innerHTML = '<div style="text-align:center;padding:32px;color:var(--text-sub)">лЎңл”© мӨ‘вҖҰ</div>';

async function statsNavWeek(dir) {
  const d = new Date(statsWeekAnchor + 'T00:00:00');
  d.setDate(d.getDate() + dir * 7);
  statsWeekAnchor = `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
  document.getElementById('stats-content').innerHTML = '<div style="text-align:center;padding:32px;color:var(--text-sub)">лЎңл”© мӨ‘вҖҰ</div>';
  await loadStatsForDates(getWeekOf(statsWeekAnchor));
  renderStatsContent();
}

async function statsNavMonth(dir) {
  statsMonthMonth += dir;
  if (statsMonthMonth > 12) { statsMonthMonth = 1; statsMonthYear++; }
  if (statsMonthMonth < 1) { statsMonthMonth = 12; statsMonthYear--; }
  document.getElementById('stats-content').innerHTML = '<div style="text-align:center;padding:32px;color:var(--text-sub)">лЎңл”© мӨ‘вҖҰ</div>';
  await loadStatsForDates(getMonthDates(statsMonthYear, statsMonthMonth));
  renderStatsContent();
}

function minsToTime(mins) { return `${p2(Math.floor(mins/60))}:${p2(mins%60)}`; }
function timeToMins(t) { const [h,m] = t.split(':').map(Number); return h*60+m; }

function renderStatsContent() {
  const rid = statsRoutineId;
  if (!rid) return;
  const tod = todayStr();
  const routine = routines.find(r => r.id === rid);

  // в”Җв”Җ global summary stats (all cached dates) в”Җв”Җ
  const allCachedDates = Object.keys(statsCache).sort().filter(d => d <= tod);
  let maxStreak = 0, cur = 0;
  allCachedDates.forEach(d => {
    if (statsCache[d][rid]) { cur++; if (cur > maxStreak) maxStreak = cur; } else cur = 0;
  });
  const allTimes = allCachedDates.map(d => statsCache[d][rid+'_t']).filter(Boolean);
  let avgTime = 'вҖ“';
  if (allTimes.length > 0) {
    const avg = Math.round(allTimes.reduce((s,t) => s + timeToMins(t), 0) / allTimes.length);
    avgTime = minsToTime(avg);
  }

  let html = '';

  if (statsTab === 'week') {
    const weekDates = getWeekOf(statsWeekAnchor);
    const isCurrentWeek = weekDates.join(',') === getWeekOf(todayStr()).join(',');
    const weekStart = new Date(weekDates[0]+'T00:00:00');
    const weekEnd   = new Date(weekDates[6]+'T00:00:00');
    const weekLabel = isCurrentWeek ? 'мқҙлІҲ мЈј'
      : `${weekStart.getMonth()+1}/${weekStart.getDate()} ~ ${weekEnd.getMonth()+1}/${weekEnd.getDate()}`;

    html += `<div class="stats-nav-row">
      <button class="stats-nav-btn" onclick="statsNavWeek(-1)">вҖ№</button>
      <span class="stats-nav-label">${weekLabel}</span>
      <button class="stats-nav-btn" onclick="statsNavWeek(1)" ${isCurrentWeek?'disabled':''}>вҖә</button>
    </div>`;

    html += '<div class="stats-dots">';
    weekDates.forEach((date, idx) => {
      const isFuture = date > tod;
      const isToday = date === tod;
      const done = !isFuture && statsCache[date]?.[rid];
      const d = new Date(date + 'T00:00:00');
      const cls = ['stats-dot-circle', done?'done':'', isToday?'today':'', isFuture?'future':''].join(' ');
      html += `<div class="stats-dot">
        <div class="stats-dot-lbl" style="font-weight:${isToday?700:500};color:${isToday?'var(--accent)':'var(--text-sub)'}">${DAY_MON[idx]}</div>
        <div class="${cls}"></div>
        <div class="stats-dot-lbl">${d.getDate()}</div>
      </div>`;
    });
    html += '</div>';

    const weekPast = weekDates.filter(d => d <= tod);
    const weekDone = weekPast.filter(d => statsCache[d]?.[rid]).length;
    const weekRate = weekPast.length > 0 ? Math.round(weekDone/weekPast.length*100) : 0;
    const weekTimes = weekPast.filter(d => statsCache[d]?.[rid]).map(d => statsCache[d][rid+'_t']).filter(Boolean);
    let weekAvg = 'вҖ“';
    if (weekTimes.length > 0) {
      weekAvg = minsToTime(Math.round(weekTimes.reduce((s,t) => s+timeToMins(t),0)/weekTimes.length));
    }
    html += `<div style="text-align:center;font-size:13px;color:var(--text-sub);margin:6px 0 12px">лӢ¬м„ұлҘ  <b style="color:var(--success)">${weekRate}%</b> (${weekDone}/${weekPast.length}мқј)&ensp;В·&ensp;нҸүк·  мҷ„лЈҢ <b>${weekAvg}</b></div>`;

  } else {
    const year = statsMonthYear, month = statsMonthMonth;
    const tod2 = `${year}-${p2(month)}-99`;
    const firstDay = new Date(year, month-1, 1);
    const lastDay  = new Date(year, month, 0);
    const startOffset = firstDay.getDay() === 0 ? 6 : firstDay.getDay()-1;
    const [cy, cm] = todayStr().split('-').map(Number);
    const isCurrentMonth = year === cy && month === cm;
    const isPastLimit = year < cy - 1 || (year === cy - 1 && month < cm - 11);

    html += `<div class="stats-nav-row">
      <button class="stats-nav-btn" onclick="statsNavMonth(-1)" ${isPastLimit?'disabled':''}>вҖ№</button>
      <span class="stats-nav-label">${year}л…„ ${month}мӣ”</span>
      <button class="stats-nav-btn" onclick="statsNavMonth(1)" ${isCurrentMonth?'disabled':''}>вҖә</button>
    </div>`;

    html += '<div class="stats-calendar-hdr">' + ['мӣ”','нҷ”','мҲҳ','лӘ©','кёҲ','нҶ ','мқј'].map(d =>
      `<div style="text-align:center;font-size:10px;color:var(--text-sub);padding:2px">${d}</div>`).join('') + '</div>';
    html += '<div class="stats-calendar">';
    for (let i = 0; i < startOffset; i++) html += '<div class="cal-day empty"></div>';
    for (let day = 1; day <= lastDay.getDate(); day++) {
      const dateStr = `${year}-${p2(month)}-${p2(day)}`;
      const isFuture = dateStr > tod;
      const isToday  = dateStr === tod;
      const done = !isFuture && statsCache[dateStr]?.[rid];
      const cls = 'cal-day '+(isFuture?'future':done?'done':'miss')+(isToday?' today-cal':'');
      html += `<div class="${cls}" title="${dateStr}">${day}</div>`;
    }
    html += '</div>';

    const monthPast = getMonthDates(year, month).filter(d => d <= tod);
    const monthDone = monthPast.filter(d => statsCache[d]?.[rid]).length;
    const monthRate = monthPast.length > 0 ? Math.round(monthDone/monthPast.length*100) : 0;
    const monthTimes = monthPast.filter(d => statsCache[d]?.[rid]).map(d => statsCache[d][rid+'_t']).filter(Boolean);
    let monthAvg = 'вҖ“';
    if (monthTimes.length > 0) {
      monthAvg = minsToTime(Math.round(monthTimes.reduce((s,t) => s+timeToMins(t),0)/monthTimes.length));
    }
    html += `<div style="text-align:center;font-size:13px;color:var(--text-sub);margin:8px 0 12px">лӢ¬м„ұлҘ  <b style="color:var(--success)">${monthRate}%</b> (${monthDone}/${monthPast.length}мқј)&ensp;В·&ensp;нҸүк·  мҷ„лЈҢ <b>${monthAvg}</b></div>`;
  }

  // в”Җв”Җ summary strip в”Җв”Җ
  html += `<div class="stats-summary">
    <div class="stat-item"><div class="stat-val">${maxStreak}мқј</div><div class="stat-lbl">мөңмһҘ м—°мҶҚ лӢ¬м„ұ</div></div>
    <div class="stat-item"><div class="stat-val" style="font-size:16px">${avgTime}</div><div class="stat-lbl">м „мІҙ нҸүк·  мҷ„лЈҢ мӢңк°„</div></div>
  </div>`;

  // в”Җв”Җ schedule vs actual (if set) в”Җв”Җ
  if (routine?.timeStart && allTimes.length > 0) {
    const scheduled = timeToMins(routine.timeStart);
    const avgMins = Math.round(allTimes.reduce((s,t) => s+timeToMins(t),0)/allTimes.length);
    const diff = avgMins - scheduled;
    const diffLabel = diff === 0 ? 'м •мӢң' : diff > 0 ? `${diff}л¶„ лҠҰкІҢ` : `${-diff}л¶„ мқјм°Қ`;
    const diffColor = diff === 0 ? 'var(--success)' : diff > 5 ? 'var(--danger)' : '#F59E0B';
    html += `<div class="schedule-compare" style="margin-top:10px">
      <div>
        <div class="sc-label">мҳҲм • мӢңк°„</div>
        <div class="sc-val">${routine.timeStart}${routine.timeEnd ? ' ~ '+routine.timeEnd : ''}</div>
      </div>
      <div style="margin-left:auto;text-align:right">
        <div class="sc-label">нҸүк·  мҷ„лЈҢ</div>
        <div class="sc-val" style="color:${diffColor}">${avgTime} <span style="font-size:11px;font-weight:500">(${diffLabel})</span></div>
      </div>
    </div>`;
  }

  document.getElementById('stats-content').innerHTML = html;
}

async function openTabStats(tab) {
  const tabRoutines = routines.filter(r => r.tabId === tab.id).sort((a,b) => (a.order||0)-(b.order||0));
  document.getElementById('tab-stats-title').textContent = `${tab.emoji||''} ${tab.name} нҶөкі„`;
  document.getElementById('tab-stats-content').innerHTML = '<div style="text-align:center;padding:32px;color:var(--text-sub)">лЎңл”© мӨ‘вҖҰ</div>';
  openModal('tab-stats-modal');

  const tod = todayStr();
  const monthDates = [];
  const [year, month] = tod.split('-').map(Number);
  const lastDay = new Date(year, month, 0).getDate();
  for (let d = 1; d <= lastDay; d++) {
    const ds = `${year}-${p2(month)}-${p2(d)}`;
    if (ds <= tod) monthDates.push(ds);
  }

  const monthCache = {};
  await Promise.all(monthDates.map(async date => {
    const doc = await col('checks').doc(date).get();
    monthCache[date] = doc.exists ? (doc.data() || {}) : {};
  }));

  let html = `<div style="font-size:12px;color:var(--text-sub);margin-bottom:12px">${year}л…„ ${month}мӣ” лӢ¬м„ұлҘ </div>`;
  if (tabRoutines.length === 0) {
    html += '<div style="color:var(--text-sub);font-size:14px;padding:16px 0">лЈЁнӢҙмқҙ м—ҶмҠөлӢҲлӢӨ</div>';
  } else {
    tabRoutines.forEach(r => {
      const done = monthDates.filter(d => monthCache[d][r.id]).length;
      const pct = monthDates.length > 0 ? Math.round(done / monthDates.length * 100) : 0;
      html += `<div class="tab-stats-row">
        <span class="tab-stats-name">${esc(r.name)}</span>
        <div class="tab-stats-bar-wrap"><div class="tab-stats-bar" style="width:${pct}%"></div></div>
        <span class="tab-stats-pct">${pct}%</span>
      </div>`;
    });

    const overallPct = tabRoutines.length > 0 && monthDates.length > 0
      ? Math.round(monthDates.reduce((s, d) => {
          const cnt = tabRoutines.filter(r => monthCache[d][r.id]).length;
          return s + cnt / tabRoutines.length;
        }, 0) / monthDates.length * 100) : 0;
    html += `<div style="margin-top:14px;padding-top:12px;border-top:2px solid var(--border);display:flex;justify-content:space-between;align-items:center">
      <span style="font-weight:700;font-size:14px">м „мІҙ нҸүк· </span>
      <span style="font-size:18px;font-weight:800;color:var(--success)">${overallPct}%</span>
    </div>`;
  }

  document.getElementById('tab-stats-content').innerHTML = html;
}
