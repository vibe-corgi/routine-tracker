<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>루틴 트래커</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="루틴">
<meta name="theme-color" content="#4F46E5">
<link rel="manifest" href="/routine-tracker/manifest.json">
<link rel="apple-touch-icon" href="/routine-tracker/apple-touch-icon.png">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F0F2F5;
  --card: #FFFFFF;
  --text: #1A1A2E;
  --text-sub: #6B7280;
  --border: #E5E7EB;
  --accent: #4F46E5;
  --accent-light: #EEF2FF;
  --success: #10B981;
  --danger: #EF4444;
  --radius: 14px;
  --shadow: 0 2px 10px rgba(0,0,0,0.07);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ─────────────── SCREENS ─────────────── */
.screen {
  display: none;
  min-height: 100vh;
  align-items: center;
  justify-content: center;
  padding: 24px;
  flex-direction: column;
}
.screen.active { display: flex; }

.setup-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 32px;
  width: 100%;
  max-width: 500px;
  box-shadow: var(--shadow);
}
.setup-card h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.setup-card .sub { color: var(--text-sub); font-size: 14px; line-height: 1.6; margin-bottom: 24px; }

/* ─────────────── FORM ─────────────── */
.fg { margin-bottom: 14px; }
.fg label { display: block; font-size: 12px; font-weight: 600; color: var(--text-sub); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .5px; }
.fg input, .fg textarea {
  width: 100%; padding: 11px 14px;
  border: 1.5px solid var(--border); border-radius: 10px;
  font-size: 14px; outline: none; transition: border-color .2s;
  background: #FAFAFA; color: var(--text); font-family: inherit;
}
.fg input:focus, .fg textarea:focus { border-color: var(--accent); background: white; }
.fg textarea { height: 110px; resize: none; font-size: 12px; font-family: 'Courier New', monospace; line-height: 1.6; }

/* ─────────────── BUTTONS ─────────────── */
.btn {
  padding: 11px 20px; border: none; border-radius: 10px;
  font-size: 14px; font-weight: 600; cursor: pointer;
  transition: all .2s; font-family: inherit;
}
.btn-primary { background: var(--accent); color: white; width: 100%; padding: 13px; font-size: 15px; }
.btn-primary:hover { background: #4338CA; }
.btn-ghost { background: transparent; color: var(--text-sub); }
.btn-ghost:hover { background: var(--border); color: var(--text); }
.btn-icon {
  width: 34px; height: 34px; border: none;
  background: transparent; border-radius: 8px;
  cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
  font-size: 16px; color: var(--text-sub); transition: background .2s; flex-shrink: 0;
}
.btn-icon:hover { background: var(--border); }

.warning-box {
  background: #FFF7ED; border: 1px solid #FED7AA; border-radius: 10px;
  padding: 14px; font-size: 12px; color: #92400E; line-height: 1.7;
  margin-bottom: 18px;
}
.warning-box code { background: rgba(0,0,0,.07); padding: 1px 4px; border-radius: 4px; font-size: 11px; }

/* ─────────────── APP LAYOUT ─────────────── */
#app { display: none; flex-direction: column; min-height: 100vh; max-width: 640px; margin: 0 auto; }

/* ─────────────── HEADER ─────────────── */
#header {
  background: var(--card); padding: 14px 18px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 10;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
#header h1 { font-size: 17px; font-weight: 700; }
.date-text { font-size: 12px; color: var(--text-sub); margin-top: 2px; }

/* ─────────────── TAB BAR ─────────────── */
#tab-bar {
  background: var(--card); border-bottom: 1px solid var(--border);
  padding: 0 8px; display: flex; overflow-x: auto; scrollbar-width: none;
  gap: 2px; align-items: stretch;
}
#tab-bar::-webkit-scrollbar { display: none; }

.tab-btn {
  padding: 13px 15px; border: none; background: transparent;
  font-size: 14px; font-weight: 500; color: var(--text-sub);
  cursor: pointer; white-space: nowrap;
  border-bottom: 2.5px solid transparent; transition: all .2s;
  font-family: inherit; display: flex; align-items: center; gap: 5px;
}
.tab-btn.active { font-weight: 700; }
.tab-add-btn {
  padding: 10px 12px; border: none; background: transparent;
  color: var(--text-sub); cursor: pointer; font-size: 22px;
  font-family: inherit; flex-shrink: 0; display: flex; align-items: center;
  margin-left: auto;
}
.tab-add-btn:hover { color: var(--accent); }

/* ─────────────── CONTENT ─────────────── */
#content { flex: 1; padding: 14px; display: flex; flex-direction: column; gap: 10px; }

/* ─────────────── TAB HEADER ─────────────── */
.tab-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 2px;
}
.tab-header h2 { font-size: 17px; font-weight: 700; }
.tab-header-actions { display: flex; gap: 2px; }

/* ─────────────── PROGRESS ─────────────── */
.progress-card {
  background: var(--card); border-radius: var(--radius); padding: 14px 16px;
  box-shadow: var(--shadow);
}
.progress-label {
  font-size: 13px; color: var(--text-sub); margin-bottom: 8px;
  display: flex; justify-content: space-between; align-items: center;
}
.progress-label span:last-child { font-weight: 700; font-size: 14px; color: var(--text); }
.progress-bar { height: 7px; background: var(--border); border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--success); border-radius: 4px; transition: width .4s ease; }

/* ─────────────── ROUTINE LIST ─────────────── */
.routine-list { display: flex; flex-direction: column; gap: 7px; }

.routine-item {
  background: var(--card); border-radius: 12px;
  padding: 13px 14px; display: flex; flex-direction: column; gap: 6px;
  box-shadow: var(--shadow); transition: opacity .25s, transform .15s;
  user-select: none;
}
.routine-item-row {
  display: flex; align-items: center; gap: 11px;
}
.routine-memo-input {
  width: 100%; box-sizing: border-box;
  border: none; border-top: 1px solid var(--border);
  background: transparent; color: var(--text);
  font-size: 13px; padding: 6px 2px 2px 2px;
  resize: none; outline: none; font-family: inherit;
  line-height: 1.5; min-height: 24px; overflow: hidden;
  user-select: text;
}
.routine-memo-input::placeholder { color: var(--text-sub); opacity: .7; }
.routine-item.checked { opacity: .55; }
.routine-item:active { transform: scale(.99); }

.r-check {
  width: 24px; height: 24px; border: 2px solid var(--border);
  border-radius: 50%; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s; background: white;
}
.r-check.checked { background: var(--success); border-color: var(--success); color: white; }
.r-check.checked::after { content: '✓'; font-size: 13px; font-weight: 800; }
.edit-mode .r-check { pointer-events: none; opacity: .5; }

.r-name { flex: 1; font-size: 15px; line-height: 1.4; }
.routine-item.checked .r-name { text-decoration: line-through; color: var(--text-sub); }

.r-del {
  width: 28px; height: 28px; border: none; background: #FEE2E2;
  color: var(--danger); border-radius: 7px; cursor: pointer;
  font-size: 15px; display: none; align-items: center; justify-content: center;
  font-weight: 700; flex-shrink: 0;
}
.edit-mode .r-del { display: flex; }

.r-time {
  font-size: 11px; color: var(--text-sub); background: var(--bg);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 3px 8px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
  font-family: 'Courier New', monospace; display: inline-flex; align-items: center;
}
.r-time:hover { border-color: var(--accent); color: var(--accent); }
.edit-mode .r-time { display: none; }

.r-goal {
  font-size: 10px; font-weight: 600; color: #8B5CF6;
  background: #EDE9FE; border-radius: 99px;
  padding: 2px 7px; white-space: nowrap; flex-shrink: 0; cursor: pointer;
}
.r-goal:hover { background: #DDD6FE; }

.r-edit {
  width: 26px; height: 26px; border: none; background: #EFF6FF;
  color: #3B82F6; border-radius: 6px; cursor: pointer;
  font-size: 13px; display: none; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.edit-mode .r-edit { display: flex; }

.r-move {
  display: none; flex-direction: column; gap: 1px; flex-shrink: 0;
}
.edit-mode .r-move { display: flex; }
.r-move button {
  width: 22px; height: 18px; border: none; background: var(--bg);
  border-radius: 4px; cursor: pointer; font-size: 10px; color: var(--text-sub);
  display: flex; align-items: center; justify-content: center; padding: 0;
}
.r-move button:hover { background: var(--border); color: var(--text); }

.add-routine-btn {
  background: var(--card); border: 1.5px dashed var(--border);
  border-radius: 12px; padding: 13px 16px; width: 100%;
  text-align: left; font-size: 14px; color: var(--text-sub);
  cursor: pointer; font-family: inherit; transition: all .2s;
}
.add-routine-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

/* ─────────────── STREAK ─────────────── */
.streak-card {
  background: var(--card); border-radius: var(--radius);
  padding: 16px; box-shadow: var(--shadow);
}
.streak-card h3 { font-size: 13px; font-weight: 600; color: var(--text-sub); margin-bottom: 14px; letter-spacing: .3px; }
.streak-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
.streak-col { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.streak-label { font-size: 11px; font-weight: 600; }
.streak-date { font-size: 10px; color: var(--text-sub); }
.streak-dot {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--border); display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; transition: all .3s;
}
.streak-dot.today { box-shadow: 0 0 0 2.5px var(--accent); }
.streak-dot.future { opacity: .25; }
.streak-dot.full { background: var(--success); color: white; }
.streak-dot.high { background: #6EE7B7; color: #065F46; }
.streak-dot.mid { background: #FCD34D; color: #78350F; }
.streak-dot.low { background: #FCA5A5; color: #7F1D1D; }

/* ─────────────── EMPTY STATE ─────────────── */
.empty-state { text-align: center; padding: 48px 24px; color: var(--text-sub); }
.empty-state .ei { font-size: 44px; margin-bottom: 10px; }
.empty-state p { font-size: 14px; line-height: 1.6; }

/* ─────────────── SUCCESS BANNER ─────────────── */
.success-banner {
  background: linear-gradient(135deg, #10B981, #059669);
  color: white; border-radius: var(--radius);
  padding: 18px 20px; text-align: center;
  font-size: 18px; font-weight: 700;
  box-shadow: 0 4px 16px rgba(16,185,129,.35);
  animation: pop .4s cubic-bezier(.175,.885,.32,1.275);
}
@keyframes pop {
  0% { transform: scale(.92); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
.success-banner .s-sub {
  font-size: 13px; font-weight: 400; opacity: .85; margin-top: 4px;
}

/* ─────────────── DATE NAV ─────────────── */
.date-nav { display: flex; align-items: center; gap: 6px; }
.date-nav-btn {
  width: 28px; height: 28px; border: none; background: var(--bg);
  border-radius: 8px; cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-sub);
}
.date-nav-btn:hover { background: var(--border); }
.date-nav-btn:disabled { opacity: .3; cursor: default; }
.past-badge {
  font-size: 11px; background: #FEF3C7; color: #92400E;
  border-radius: 99px; padding: 2px 8px; font-weight: 600;
}

/* ─────────────── DRAG ─────────────── */
.r-drag {
  display: none; color: var(--text-sub); cursor: grab; font-size: 16px;
  padding: 0 2px; flex-shrink: 0; user-select: none;
}
.edit-mode .r-drag { display: flex; align-items: center; }
.routine-item.dragging { opacity: .35; }
.routine-item.drag-over { outline: 2px solid var(--accent); outline-offset: -2px; border-radius: 12px; }

/* ─────────────── STREAK BADGE ─────────────── */
.tab-btn .tab-done { font-size: 12px; }
.streak-header {
  display: flex; align-items: center; gap: 4px;
  margin-bottom: 14px;
}
.streak-header h3 { font-size: 13px; font-weight: 600; color: var(--text-sub); flex: 1; }
.streak-count {
  font-size: 12px; font-weight: 700; color: var(--success);
  background: #D1FAE5; padding: 3px 10px; border-radius: 99px;
}

/* ─────────────── MODAL ─────────────── */
.overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45);
  z-index: 100; align-items: center; justify-content: center; padding: 20px;
}
.overlay.active { display: flex; }
.modal {
  background: var(--card); border-radius: var(--radius);
  padding: 24px; width: 100%; max-width: 420px;
  box-shadow: 0 16px 48px rgba(0,0,0,.15);
}
.modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
.modal-actions { display: flex; gap: 8px; margin-top: 20px; }
.modal-actions .btn { flex: 1; }

.emoji-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; margin: 10px 0; }
.emoji-btn {
  padding: 7px; border: 1.5px solid transparent; border-radius: 8px;
  font-size: 20px; cursor: pointer; background: var(--bg); transition: all .15s;
}
.emoji-btn:hover, .emoji-btn.sel { border-color: var(--accent); background: var(--accent-light); }

.color-row { display: flex; gap: 9px; flex-wrap: wrap; margin: 10px 0; }
.color-btn {
  width: 30px; height: 30px; border-radius: 50%;
  border: 3px solid transparent; cursor: pointer; transition: transform .15s;
}
.color-btn:hover { transform: scale(1.15); }
.color-btn.sel { border-color: var(--text); transform: scale(1.1); }

/* ─────────────── CONTEXT MENU ─────────────── */
.ctx {
  position: fixed; background: var(--card); border-radius: 12px;
  box-shadow: 0 8px 28px rgba(0,0,0,.15); padding: 6px;
  z-index: 200; min-width: 160px; display: none;
}
.ctx button {
  display: flex; align-items: center; gap: 9px; width: 100%;
  padding: 10px 13px; border: none; background: transparent;
  font-size: 14px; text-align: left; cursor: pointer;
  border-radius: 7px; font-family: inherit; color: var(--text);
}
.ctx button:hover { background: var(--bg); }
.ctx button.danger { color: var(--danger); }
.ctx hr { border: none; border-top: 1px solid var(--border); margin: 4px 0; }

/* ─────────────── TOAST ─────────────── */
#toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(70px);
  background: #1A1A2E; color: white;
  padding: 11px 22px; border-radius: 99px;
  font-size: 14px; font-weight: 500; z-index: 300;
  transition: transform .3s ease; pointer-events: none; white-space: nowrap;
}
#toast.show { transform: translateX(-50%) translateY(0); }

.divider { height: 1px; background: var(--border); margin: 14px 0; }

@media (max-width: 480px) {
  .setup-card { padding: 22px 16px; }
  .streak-dot { width: 30px; height: 30px; font-size: 10px; }
}

/* ─────────────── STATS MODAL ─────────────── */
.stats-tab-row { display: flex; gap: 8px; margin-bottom: 16px; }
.stats-tab-btn {
  flex: 1; padding: 8px; border: 1.5px solid var(--border);
  border-radius: 8px; background: transparent; font-size: 13px;
  font-weight: 600; cursor: pointer; font-family: inherit; color: var(--text-sub);
  transition: all .15s;
}
.stats-tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

.stats-dots { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin: 10px 0 6px; }
.stats-dot { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.stats-dot-circle {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--border); transition: background .2s;
}
.stats-dot-circle.done { background: var(--success); }
.stats-dot-circle.today { box-shadow: 0 0 0 2px var(--accent); }
.stats-dot-circle.future { opacity: .35; }
.stats-dot-lbl { font-size: 10px; color: var(--text-sub); }

.stats-calendar-hdr { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; margin-bottom: 4px; }
.stats-calendar { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
.cal-day {
  aspect-ratio: 1; border-radius: 5px; display: flex;
  align-items: center; justify-content: center;
  font-size: 10px; font-weight: 600;
}
.cal-day.empty { background: transparent; }
.cal-day.done { background: var(--success); color: white; }
.cal-day.miss { background: #FEE2E2; color: #B91C1C; }
.cal-day.future { background: var(--border); color: var(--text-sub); opacity: .4; }
.cal-day.today-cal { outline: 2px solid var(--accent); outline-offset: -1px; }

.stats-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 14px; }
.stat-item { background: var(--bg); border-radius: 10px; padding: 10px 12px; }
.stat-item .stat-val { font-size: 20px; font-weight: 700; }
.stat-item .stat-lbl { font-size: 11px; color: var(--text-sub); margin-top: 2px; }

.tab-stats-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
.tab-stats-row:last-child { border-bottom: none; }

.ts-section { padding-bottom: 18px; margin-bottom: 18px; border-bottom: 1px solid var(--border); }
.ts-title { font-size: 12px; font-weight: 700; color: var(--text-sub); letter-spacing: .4px; margin-bottom: 12px; text-transform: uppercase; }

.time-stat-card { background: var(--bg); border-radius: 10px; padding: 10px 12px; }
.time-stat-label { font-size: 11px; color: var(--text-sub); margin-bottom: 4px; font-weight: 600; }
.time-stat-val { font-size: 18px; font-weight: 800; font-family: 'Courier New', monospace; }
.time-stat-sub { font-size: 11px; margin-top: 3px; font-weight: 600; }
.tab-stats-name { flex: 1; font-size: 14px; font-weight: 500; }
.tab-stats-bar-wrap { width: 80px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.tab-stats-bar { height: 100%; background: var(--success); border-radius: 3px; }
.tab-stats-pct { font-size: 12px; font-weight: 700; color: var(--success); width: 32px; text-align: right; }

.r-name-clickable { cursor: pointer; }
.r-name-clickable:hover { color: var(--accent); text-decoration: underline; }

/* ─────────────── MEMO BOX ─────────────── */
.memo-box {
  background: var(--card); border-radius: var(--radius);
  padding: 12px 14px; box-shadow: var(--shadow);
  border-left: 3px solid #F59E0B;
}
.memo-box textarea {
  width: 100%; border: none; background: transparent;
  font-size: 14px; color: var(--text); resize: none; outline: none;
  min-height: 64px; max-height: 200px; font-family: inherit; line-height: 1.65;
  overflow-y: auto;
}
.memo-footer {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 6px; font-size: 11px; color: var(--text-sub);
}
.memo-saved { transition: opacity .4s; font-size: 11px; color: var(--success); }

/* tab fixed memo */
.tab-fixed-memo {
  background: var(--card); border-radius: var(--radius);
  padding: 10px 14px; box-shadow: var(--shadow);
  border-left: 3px solid #A78BFA;
  display: flex; flex-direction: column; gap: 4px;
}
.tab-fixed-memo-header {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 11px; color: var(--text-sub);
}
.tab-fixed-memo textarea {
  width: 100%; border: none; background: transparent;
  font-size: 14px; color: var(--text); resize: none; outline: none;
  min-height: 40px; max-height: 200px; font-family: inherit; line-height: 1.65;
  overflow-y: auto;
}
.tab-fixed-memo-del {
  background: none; border: none; cursor: pointer; font-size: 12px;
  color: var(--text-sub); padding: 0 2px;
}
.tab-fixed-memo-del:hover { color: var(--danger); }

/* all-memos modal */
.memo-view-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.all-memo-item { padding: 14px 0; border-bottom: 1px solid var(--border); }
.all-memo-item:last-child { border-bottom: none; }
.all-memo-tab-name { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
.all-memo-text { font-size: 14px; color: var(--text); line-height: 1.7; white-space: pre-wrap; background: var(--bg); border-radius: 8px; padding: 10px 12px; }

.r-schedule {
  font-size: 10px; color: #7C3AED; background: #EDE9FE;
  border-radius: 6px; padding: 2px 7px; flex-shrink: 0;
  font-family: 'Courier New', monospace; white-space: nowrap;
}
.edit-mode .r-schedule { display: none; }

.stats-nav-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.stats-nav-label { font-size: 13px; font-weight: 700; color: var(--text); }
.stats-nav-btn {

<!-- ═══════════════ FIREBASE SDK ═══════════════ -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
// ═══════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════
const EMOJIS = ['☀️','🌙','💪','🏃','🧘','💊','📚','✍️','🎯','💧','🥗','🛏️','🧹','💻','🎵','🌱','❤️','⭐','🔥','✅','📌','🎨','🏋️','🚶','🧴','🍎','☕','🌸'];
const COLORS = ['#4F46E5','#10B981','#F59E0B','#EF4444','#8B5CF6','#06B6D4','#F97316','#EC4899','#14B8A6','#84CC16'];
const DAY_KO = ['일','월','화','수','목','금','토'];

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let db = null;
let roomCode = '';
let currentTabId = null;
let tabs = [];
let routines = [];
let todayChecks = {};
let weekChecks = {};
let editMode = false;
let selEmoji = '📌';
let selColor = '#4F46E5';
let editTabId = null;
let ctxTab = null;
let unsubs = [];
let weekUnsubs = [];
let routineUnsub = null;
let viewDate = '';
let checkUnsub = null;
let dragSrcId = null;
let statsRoutineId = null;
let statsCache = {};
let statsTab = 'week';
let statsWeekAnchor = '';
let statsMonthYear = 0;
let statsMonthMonth = 0;
let settingRoutineId = null;
let streakWeekAnchor = '';
let memoCache = {};        // { date: { tabId: text } }
let memoDebounce = null;
let memoViewMode = 'today';
let memoNavDay = '';
let memoNavWeek = '';
let memoNavYear = 0;
let memoNavMonth = 0;

// ═══════════════════════════════════════════
// SETUP FLOW
// ═══════════════════════════════════════════
function init() {
  buildPickers();
  bindKeys();
  setupOutsideClick();
  updateDateText();

  firebase.initializeApp({
    apiKey: "AIzaSyCuiVQ1TRVrSe4FYuIS6ONXfiNfz55zNQk",
    authDomain: "routine-tracker-f1de1.firebaseapp.com",
    projectId: "routine-tracker-f1de1",
    storageBucket: "routine-tracker-f1de1.firebasestorage.app",
    messagingSenderId: "37041493249",
    appId: "1:37041493249:web:3b2e54ea81e838a8c3f700"
  });

  db = firebase.firestore();

  firebase.auth().onAuthStateChanged(user => {
    if (user) {
      roomCode = user.uid;
      launchApp();
    } else {
      show('login-screen');
    }
  });
}

function show(id) {
  document.getElementById('login-screen').classList.toggle('active', id === 'login-screen');
  document.getElementById('app').style.display = id === 'app' ? 'flex' : 'none';
}

function googleLogin() {
  const provider = new firebase.auth.GoogleAuthProvider();
  firebase.auth().signInWithRedirect(provider).catch(e => toast('로그인 실패: ' + e.message));
}

function openSettings() {
  const user = firebase.auth().currentUser;
  document.getElementById('settings-info').innerHTML =
    `<b>${user ? user.displayName : ''}</b><br>${user ? user.email : ''}`;
  openModal('settings-modal');
}

function logout() {
  if (!confirm('로그아웃 할까요?')) return;
  unsubs.forEach(u => u());
  unsubs = []; weekUnsubs.forEach(u => u()); weekUnsubs = [];
  if (routineUnsub) { routineUnsub(); routineUnsub = null; }
  if (checkUnsub) { checkUnsub(); checkUnsub = null; }
  memoCache = {};
  firebase.auth().signOut();
  closeModal('settings-modal');
}

function col(name) {
  return db.collection('users').doc(roomCode).collection(name);
}

// ═══════════════════════════════════════════
// LAUNCH APP
// ═══════════════════════════════════════════
function launchApp() {
  document.getElementById('login-screen').classList.remove('active');
  document.getElementById('app').style.display = 'flex';
  viewDate = todayStr();
  streakWeekAnchor = todayStr();
  updateDateText();
  startListeners();
}

function navigateDate(dir) {
  const d = new Date(viewDate + 'T00:00:00');
  d.setDate(d.getDate() + dir);
  const next = `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
  if (next > todayStr()) return;
  viewDate = next;
  updateDateText();
  subscribeChecks();
  renderContent();
}

function navigateStreakWeek(dir) {
  const d = new Date(streakWeekAnchor + 'T00:00:00');
  d.setDate(d.getDate() + dir * 7);
  const next = `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
  if (next > todayStr()) return;
  streakWeekAnchor = next;
  refreshWeekListeners();
}

function startListeners() {
  const u1 = col('tabs').orderBy('order').onSnapshot(snap => {
    tabs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (!currentTabId && tabs.length > 0) currentTabId = tabs[0].id;
    if (currentTabId && !tabs.find(t => t.id === currentTabId)) {
      currentTabId = tabs.length > 0 ? tabs[0].id : null;
    }
    renderTabs();
    startRoutineListener();
  });

  unsubs.push(u1);
  subscribeChecks();
  startWeekListeners();
}

function subscribeChecks() {
  if (checkUnsub) checkUnsub();
  checkUnsub = col('checks').doc(viewDate).onSnapshot(doc => {
    todayChecks = doc.exists ? (doc.data() || {}) : {};
    renderContent();
  });
}

function startRoutineListener() {
  if (routineUnsub) routineUnsub();
  routineUnsub = col('routines').onSnapshot(snap => {
    routines = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderContent();
  });
}

function startWeekListeners() {
  getWeekOf(streakWeekAnchor).forEach(date => {
    const u = col('checks').doc(date).onSnapshot(doc => {
      weekChecks[date] = doc.exists ? (doc.data() || {}) : {};
      rerenderStreak();
    });
    weekUnsubs.push(u);
  });
}

function refreshWeekListeners() {
  weekUnsubs.forEach(u => u());
  weekUnsubs = [];
  weekChecks = {};
  startWeekListeners();
}

// ═══════════════════════════════════════════
// DATE HELPERS
// ═══════════════════════════════════════════
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
}
function p2(n) { return String(n).padStart(2,'0'); }
function getWeekOf(dateStr) {
  const d = new Date((dateStr || todayStr()) + 'T00:00:00');
  const dow = d.getDay();
  const daysToMon = dow === 0 ? 6 : dow - 1;
  const monday = new Date(d);
  monday.setDate(d.getDate() - daysToMon);
  return Array.from({length:7}, (_,i) => {
    const day = new Date(monday);
    day.setDate(monday.getDate() + i);
    return `${day.getFullYear()}-${p2(day.getMonth()+1)}-${p2(day.getDate())}`;
  });
}
function updateDateText() {
  const d = new Date((viewDate || todayStr()) + 'T00:00:00');
  const isToday = (viewDate || todayStr()) === todayStr();
  const el = document.getElementById('date-text');
  if (el) el.innerHTML = `${d.getMonth()+1}월 ${d.getDate()}일 (${DAY_KO[d.getDay()]})${isToday ? '' : ' <span class="past-badge">과거</span>'}`;
  const btnNext = document.getElementById('btn-next');
  if (btnNext) btnNext.disabled = isToday;
}

// ═══════════════════════════════════════════
// RENDER TABS
// ═══════════════════════════════════════════
function renderTabs() {
  const bar = document.getElementById('tab-bar');
  const addBtn = bar.querySelector('.tab-add-btn');
  bar.querySelectorAll('.tab-btn').forEach(el => el.remove());

  tabs.forEach(tab => {
    const tabRoutines = routines.filter(r => r.tabId === tab.id);
    const allDone = tabRoutines.length > 0 && tabRoutines.every(r => todayChecks[r.id]);

    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (tab.id === currentTabId ? ' active' : '');
    btn.innerHTML = `${tab.emoji || '📌'} ${esc(tab.name)}${allDone ? ' <span class="tab-done">✅</span>' : ''}`;
    const c = tab.color || '#4F46E5';
    if (tab.id === currentTabId) {
      btn.style.color = c;
      btn.style.borderBottomColor = c;
    }
    btn.onclick = () => selectTab(tab.id);
    btn.oncontextmenu = e => { e.preventDefault(); showCtxMenu(e, tab); };
    btn.title = '우클릭: 편집/삭제';
    bar.insertBefore(btn, addBtn);
  });
}

function selectTab(id) {
  currentTabId = id;
  editMode = false;
  renderTabs();
  renderContent();
}

// ═══════════════════════════════════════════
// RENDER CONTENT
// ═══════════════════════════════════════════
function renderContent() {
  const container = document.getElementById('content');
  if (!currentTabId) {
    container.innerHTML = `<div class="empty-state" onclick="openAddTab()" style="cursor:pointer"><div class="ei">📋</div><p>여기를 눌러<br>첫 탭을 추가하세요!</p></div>`;
    return;
  }
  const tab = tabs.find(t => t.id === currentTabId);
  if (!tab) return;

  const tabRoutines = routines
    .filter(r => r.tabId === currentTabId)
    .sort((a,b) => (a.order||0) - (b.order||0));

  const checked = tabRoutines.filter(r => todayChecks[r.id]).length;
  const total = tabRoutines.length;
  const pct = total > 0 ? Math.round(checked/total*100) : 0;
  const color = tab.color || '#4F46E5';

  const tabTimeBadge = tab.tabTimeStart
    ? `<span style="font-size:10px;background:#EDE9FE;color:#7C3AED;border-radius:6px;padding:2px 8px;font-weight:600;margin-left:6px;font-family:'Courier New',monospace">${tab.tabTimeStart}${tab.tabTimeEnd?'~'+tab.tabTimeEnd:''}</span>`
    : '';

  let html = `
    <div class="tab-header">
      <div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px">
        <h2 style="color:${color}">${tab.emoji||''} ${esc(tab.name)}</h2>
        ${tabTimeBadge}
      </div>
      <div class="tab-header-actions">
        <button class="btn-icon" onclick="toggleEditMode()" title="${editMode?'편집 완료':'루틴 편집'}">${editMode?'✅':'✏️'}</button>
        <button class="btn-icon" onclick="openTabStatsAt(${tabs.indexOf(tab)})" title="탭 통계">📊</button>
        <button class="btn-icon" onclick="showCtxMenuByBtn(event, ${tabs.indexOf(tab)})" title="탭 옵션">⋯</button>
      </div>
    </div>
    <div class="tab-fixed-memo">
      <div class="tab-fixed-memo-header">
        <span>📌 탭 메모 (고정)</span>
        <button class="tab-fixed-memo-del" onclick="clearTabFixedMemo('${tab.id}')" title="메모 삭제">✕</button>
      </div>
      <textarea id="tab-fixed-memo-${tab.id}" placeholder="이 탭에 대한 고정 메모를 입력하세요…"
        oninput="onTabFixedMemoInput('${tab.id}')"
      >${esc(tab.tabMemo || '')}</textarea>
    </div>
  `;

  if (total > 0) {
    const fc = pct === 100 ? 'var(--success)' : (pct >= 50 ? '#F59E0B' : '#6B7280');
    if (pct === 100) {
      const streak = calcStreak(currentTabId);
      html += `
        <div class="success-banner">
          🎉 ${esc(tab.name)} 완성!
          <div class="s-sub">${streak > 1 ? `🔥 ${streak}일 연속 달성 중!` : '오늘 모든 루틴을 완료했어요!'}</div>
        </div>
      `;
    } else {
      html += `
        <div class="progress-card">
          <div class="progress-label">
            <span>오늘 진행률</span>
            <span style="color:${fc}">${checked}/${total} (${pct}%)</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" style="width:${pct}%;background:${fc}"></div>
          </div>
        </div>
      `;
    }
  }

  // Load daily memo lazily (keyed by date)
  if (memoCache[viewDate] === undefined) {
    memoCache[viewDate] = {};
    col('dailyMemos').doc(viewDate).get().then(doc => {
      memoCache[viewDate] = doc.exists ? (doc.data() || {}) : {};
      const el = document.getElementById('tab-memo');
      if (el && document.activeElement !== el) el.value = memoCache[viewDate][tab.id] || '';
    });
  }
  const memoVal = (memoCache[viewDate] || {})[tab.id] || '';
  const isToday = viewDate === todayStr();
  html += `<div class="memo-box">
    <textarea id="tab-memo" placeholder="📝 ${isToday ? '오늘' : viewDate.slice(5).replace('-','/')} 메모…" oninput="onMemoInput('${tab.id}')">${esc(memoVal)}</textarea>
    <div class="memo-footer">
      <span style="font-size:11px;color:var(--text-sub)">${isToday ? '오늘' : viewDate.slice(5).replace('-','/')} 메모</span>
      <span class="memo-saved" id="memo-saved" style="opacity:0">저장됨 ✓</span>
    </div>
  </div>`;

  // Preserve memo value if user is typing during re-render
  const _preserveMemo = document.activeElement?.id === 'tab-memo'
    ? document.getElementById('tab-memo')?.value : null;

  html += `<div class="routine-list ${editMode?'edit-mode':''}">`;

  if (tabRoutines.length === 0) {
    html += `<div class="empty-state" style="padding:32px 0"><div class="ei">🌱</div><p>아래 버튼으로 루틴을 추가하세요</p></div>`;
  } else {
    tabRoutines.forEach((r) => {
      const isChecked = !!todayChecks[r.id];
      const timeVal = todayChecks[r.id + '_t'] || '';
      const goal = r.goal || 7;
      const goalLabel = goal === 7 ? '매일' : `주 ${goal}회`;
      const timeBadge = isChecked
        ? `<span class="r-time" onclick="editTime('${r.id}')">${timeVal || '+ 시간'}</span>`
        : '';
      const memoVal = esc(r.memo || '');
      html += `
        <div class="routine-item${isChecked?' checked':''}"
          draggable="${editMode}"
          ondragstart="dragStart(event,'${r.id}')"
          ondragover="dragOver(event,'${r.id}')"
          ondragleave="dragLeave(event)"
          ondrop="dragDrop(event,'${r.id}')">
          <div class="routine-item-row">
            <span class="r-drag">⠿</span>
            <div class="r-check${isChecked?' checked':''}" onclick="toggleCheck('${r.id}')"></div>
            <span class="r-name${editMode?'':' r-name-clickable'}" ${editMode?'':` onclick="openRoutineStats('${r.id}','${esc(r.name)}')" title="통계 보기"`}>${esc(r.name)}</span>
            ${timeBadge}
            ${r.timeStart ? `<span class="r-schedule">${r.timeStart}${r.timeEnd?'~'+r.timeEnd:''}</span>` : ''}
            <span class="r-goal" onclick="setGoal('${r.id}',${goal})">${goalLabel}</span>
            <button class="r-edit" onclick="openRoutineSettings('${r.id}','${esc(r.name)}','${r.timeStart||''}','${r.timeEnd||''}')" title="루틴 설정">✏️</button>
            <button class="r-del" onclick="deleteRoutine('${r.id}')">✕</button>
          </div>
          <textarea class="routine-memo-input" rows="1"
            placeholder="메모..."
            oninput="onRoutineMemoInput(this,'${r.id}')"
            onclick="event.stopPropagation()"
            ondragstart="event.stopPropagation()"
          >${memoVal}</textarea>
        </div>
      `;
    });
  }

  html += `</div>`;

  if (!editMode) {
    html += `<button class="add-routine-btn" onclick="openAddRoutine()">＋ 루틴 추가</button>`;
  }

  html += buildStreakHTML();
  container.innerHTML = html;

  // Restore memo value if user was typing
  if (_preserveMemo !== null) {
    const el = document.getElementById('tab-memo');
    if (el) { el.value = _preserveMemo; el.focus(); }
  }
}

// RENDER STREAK
// ═══════════════════════════════════════════
const DAY_MON = ['월','화','수','목','금','토','일'];

// Returns routines that existed on a given date (respects createdAt)
function routinesForDate(tabId, dateStr) {
  return routines.filter(r => r.tabId === tabId && (!r.createdAt || r.createdAt <= dateStr));
}

function buildStreakHTML() {
  const dates = getWeekOf(streakWeekAnchor);
  const tod = todayStr();
  const streak = calcStreak(currentTabId);
  const streakLabel = streak > 0 ? `🔥 ${streak}일 연속` : '';
  const isThisWeek = getWeekOf(streakWeekAnchor).join(',') === getWeekOf(todayStr()).join(',');
  const weekTitle = isThisWeek ? '이번 주' : `${dates[0].slice(5).replace('-','/')} ~ ${dates[6].slice(5).replace('-','/')}`;

  let html = `<div class="streak-card">
    <div class="streak-header">
      <button class="stats-nav-btn" onclick="navigateStreakWeek(-1)" style="margin-right:4px">‹</button>
      <h3 style="flex:1">📅 ${weekTitle}</h3>
      ${streakLabel ? `<span class="streak-count">${streakLabel}</span>` : ''}
      <button class="stats-nav-btn" onclick="navigateStreakWeek(1)" style="margin-left:4px" ${isThisWeek?'disabled':''}>›</button>
    </div>
    <div class="streak-row">`;

  dates.forEach((date, idx) => {
    const d = new Date(date + 'T00:00:00');
    const isFuture = date > tod;
    const isToday = date === tod;
    const checks = weekChecks[date] || {};
    // Only count routines that existed on this date
    const dateRoutines = routinesForDate(currentTabId, date);
    const total = dateRoutines.length;

    let cls = 'streak-dot', content = '';
    if (!isFuture && total > 0) {
      const cnt = dateRoutines.filter(r => checks[r.id]).length;
      const pct = cnt / total;
      content = cnt > 0 ? String(cnt) : '';
      if (pct === 1) cls += ' full';
      else if (pct >= 0.7) cls += ' high';
      else if (pct >= 0.3) cls += ' mid';
      else if (pct > 0) cls += ' low';
    }
    if (isToday) cls += ' today';
    if (isFuture) cls += ' future';

    html += `<div class="streak-col">
        <div class="streak-label" style="font-weight:${isToday?'700':'500'};color:${isToday?'var(--accent)':'var(--text-sub)'}">${DAY_MON[idx]}</div>
        <div class="${cls}">${content}</div>
        <div class="streak-date">${d.getDate()}</div>
      </div>`;
  });

  html += `</div></div>`;
  return html;
}

function calcStreak(tabId) {
  const dates = getWeekOf(streakWeekAnchor);
  const tod = todayStr();
  let streak = 0;
  for (const date of [...dates].filter(d => d <= tod).reverse()) {
    const dateRoutines = routinesForDate(tabId, date);
    if (dateRoutines.length === 0) continue; // no routines existed yet — skip
    const checks = weekChecks[date] || {};
    if (dateRoutines.every(r => checks[r.id])) streak++;
    else break;
  }
  return streak;
}

function rerenderStreak() {
  const container = document.getElementById('content');
  const existing = container.querySelector('.streak-card');
  if (existing) existing.outerHTML = buildStreakHTML();
}

function toggleCheck(routineId) {
  if (editMode) return;
  const newVal = !todayChecks[routineId];
  const now = new Date();
  const timeStr = `${p2(now.getHours())}:${p2(now.getMinutes())}`;
  todayChecks[routineId] = newVal;
  if (newVal) todayChecks[routineId + '_t'] = timeStr;
  else delete todayChecks[routineId + '_t'];
  const update = { [routineId]: newVal };
  if (newVal) update[routineId + '_t'] = timeStr;
  else update[routineId + '_t'] = firebase.firestore.FieldValue.delete();
  col('checks').doc(viewDate).set(update, { merge: true });
  renderContent();
}

function editTime(routineId) {
  const cur = todayChecks[routineId + '_t'] || '';
  const t = prompt('완료 시간을 입력하세요 (예: 09:30)', cur);
  if (t === null) return;
  const valid = /^\d{1,2}:\d{2}$/.test(t.trim());
  if (!valid) { toast('올바른 형식이 아닙니다 (예: 09:30)'); return; }
  todayChecks[routineId + '_t'] = t.trim();
  col('checks').doc(viewDate).set({ [routineId + '_t']: t.trim() }, { merge: true });
  renderContent();
}

function toggleEditMode() {
  editMode = !editMode;
  renderContent();
}

function openAddTab() {

async function saveTab() {
  const name = document.getElementById('tab-name').value.trim();
  if (!name) { toast('탭 이름을 입력하세요'); return; }
  const tabTimeStart = document.getElementById('tab-time-start').value;
  const tabTimeEnd   = document.getElementById('tab-time-end').value;

  const base = { name, emoji: selEmoji, color: selColor };

  if (editTabId) {
    // update: FieldValue.delete() is allowed to remove existing fields
    const upd = { ...base };
    upd.tabTimeStart = tabTimeStart || firebase.firestore.FieldValue.delete();
    upd.tabTimeEnd   = tabTimeEnd   || firebase.firestore.FieldValue.delete();
    await col('tabs').doc(editTabId).update(upd);
    toast('탭이 수정되었습니다');
  } else {
    // add: only include time fields when they have a value
    if (tabTimeStart) base.tabTimeStart = tabTimeStart;
    if (tabTimeEnd)   base.tabTimeEnd   = tabTimeEnd;
    const ref = await col('tabs').add({ ...base, order: tabs.length });
    currentTabId = ref.id;
    toast('탭이 추가되었습니다');
  }
  closeModal('tab-modal');
}

async function deleteTab() {
  if (!ctxTab) return;
  if (!confirm(`"${ctxTab.name}" 탭과 모든 루틴을 삭제할까요?`)) return;

  const rSnap = await col('routines').where('tabId','==',ctxTab.id).get();
  const batch = db.batch();
  rSnap.docs.forEach(d => batch.delete(d.ref));
  batch.delete(col('tabs').doc(ctxTab.id));
  batch.delete(col('memos').doc(ctxTab.id));
  await batch.commit();

  // memoCache is date-keyed; no per-tab cleanup needed
  if (currentTabId === ctxTab.id) currentTabId = null;
  toast('탭이 삭제되었습니다');
}

function openAddRoutine() {

}

async function saveRoutine() {
  const name = document.getElementById('routine-name').value.trim();
  if (!name) { toast('루틴 이름을 입력하세요'); return; }
  if (!currentTabId) return;

  const n = routines.filter(r => r.tabId === currentTabId).length;
  await col('routines').add({ name, tabId: currentTabId, order: n, createdAt: todayStr() });
  closeModal('routine-modal');
  toast('루틴이 추가되었습니다');
}

function dragStart(e, id) {
  dragSrcId = id;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => e.target.closest('.routine-item').classList.add('dragging'), 0);
}
function dragOver(e, id) {
  e.preventDefault();
  document.querySelectorAll('.routine-item').forEach(el => el.classList.remove('drag-over'));
  if (dragSrcId !== id) e.target.closest('.routine-item')?.classList.add('drag-over');
}
function dragLeave(e) {
  e.target.closest('.routine-item')?.classList.remove('drag-over');
}
async function dragDrop(e, targetId) {
  e.preventDefault();
  document.querySelectorAll('.routine-item').forEach(el => {
    el.classList.remove('drag-over'); el.classList.remove('dragging');
  });
  if (!dragSrcId || dragSrcId === targetId) { dragSrcId = null; return; }
  const tabRoutines = routines
    .filter(r => r.tabId === currentTabId)
    .sort((a,b) => (a.order||0) - (b.order||0));
  const fromIdx = tabRoutines.findIndex(r => r.id === dragSrcId);
  const toIdx   = tabRoutines.findIndex(r => r.id === targetId);
  const reordered = [...tabRoutines];
  const [moved] = reordered.splice(fromIdx, 1);
  reordered.splice(toIdx, 0, moved);
  const batch = db.batch();
  reordered.forEach((r, i) => batch.update(col('routines').doc(r.id), { order: i }));
  await batch.commit();
  dragSrcId = null;
}

function onMemoInput(tabId) {
  const val = document.getElementById('tab-memo')?.value || '';

  memoCache[viewDate][tabId] = val;
  clearTimeout(memoDebounce);

  memoDebounce = setTimeout(async () => {

    const el = document.getElementById('memo-saved');
    if (el) { el.style.opacity = '1'; setTimeout(() => { el.style.opacity = '0'; }, 2000); }
  }, 1200);
}

let tabFixedMemoDebounces = {};
function onTabFixedMemoInput(tabId) {
  const el = document.getElementById('tab-fixed-memo-' + tabId);
  if (!el) return;
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';

async function clearTabFixedMemo(tabId) {
  const el = document.getElementById('tab-fixed-memo-' + tabId);
  if (el) el.value = '';
  const t = tabs.find(t => t.id === tabId);

  await col('tabs').doc(tabId).update({ tabMemo: firebase.firestore.FieldValue.delete() });
}

let routineMemoDebounces = {};
function onRoutineMemoInput(el, routineId) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
  const val = el.value;
  // update in-memory routines array so re-renders don't reset the value
  const r = routines.find(r => r.id === routineId);
  if (r) r.memo = val;
  clearTimeout(routineMemoDebounces[routineId]);
  routineMemoDebounces[routineId] = setTimeout(async () => {
    await col('routines').doc(routineId).update({ memo: val || firebase.firestore.FieldValue.delete() });
  }, 1000);
}

// ── All Memos Modal ──────────────────────────
function openAllMemos() {
  const tod = todayStr();
  memoNavDay  = tod;
  memoNavWeek = tod;
  const [y, m] = tod.split('-').map(Number);
  memoNavYear = y; memoNavMonth = m;
  memoViewMode = 'today';
  openModal('all-memos-modal');
  renderAllMemos();
}

function switchMemoView(mode) {
  memoViewMode = mode;
  ['today','week','month'].forEach(m => {
    document.getElementById('mv-'+m)?.classList.toggle('active', m === mode);
  });
  renderAllMemos();
}

async function memoNavStep(dir) {
  if (memoViewMode === 'today') {
    const d = new Date(memoNavDay + 'T00:00:00');
    d.setDate(d.getDate() + dir);
    const next = `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
    if (next > todayStr()) return;
    memoNavDay = next;
  } else if (memoViewMode === 'week') {
    const d = new Date(memoNavWeek + 'T00:00:00');
    d.setDate(d.getDate() + dir * 7);
    const next = `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
    if (next > todayStr()) return;
    memoNavWeek = next;
  } else {
    memoNavMonth += dir;
    if (memoNavMonth > 12) { memoNavMonth = 1; memoNavYear++; }
    if (memoNavMonth < 1)  { memoNavMonth = 12; memoNavYear--; }
    const [cy, cm] = todayStr().split('-').map(Number);
    if (memoNavYear > cy || (memoNavYear === cy && memoNavMonth > cm)) {
      memoNavYear = cy; memoNavMonth = cm;
      return;
    }
  }
  renderAllMemos();
}

async function renderAllMemos() {
  const content = document.getElementById('all-memos-content');
  content.innerHTML = '<div style="text-align:center;padding:24px;color:var(--text-sub)">로딩 중…</div>';

  const tod = todayStr();
  let datesToLoad = [];

  if (memoViewMode === 'today') {
    datesToLoad = [memoNavDay];
  } else if (memoViewMode === 'week') {
    datesToLoad = getWeekOf(memoNavWeek).filter(d => d <= tod);
  } else {
    datesToLoad = getMonthDates(memoNavYear, memoNavMonth).filter(d => d <= tod);
  }

  // Load uncached dates
  await Promise.all(datesToLoad.filter(d => !memoCache[d]).map(async d => {
    const doc = await col('dailyMemos').doc(d).get();
    memoCache[d] = doc.exists ? (doc.data() || {}) : {};
  }));

  // ── nav bar ──
  const [cy, cm] = tod.split('-').map(Number);
  let navLabel = '', atLatest = false;
  if (memoViewMode === 'today') {
    const d = new Date(memoNavDay + 'T00:00:00');
    navLabel = memoNavDay === tod ? '오늘' : `${d.getMonth()+1}/${d.getDate()}(${DAY_KO[d.getDay()]})`;
    atLatest = memoNavDay === tod;
  } else if (memoViewMode === 'week') {
    const wk = getWeekOf(memoNavWeek);
    const ws = new Date(wk[0]+'T00:00:00'), we = new Date(wk[6]+'T00:00:00');
    const isThisWeek = getWeekOf(memoNavWeek).join(',') === getWeekOf(tod).join(',');
    navLabel = isThisWeek ? '이번 주' : `${ws.getMonth()+1}/${ws.getDate()} ~ ${we.getMonth()+1}/${we.getDate()}`;
    atLatest = isThisWeek;
  } else {
    navLabel = `${memoNavYear}년 ${memoNavMonth}월`;
    atLatest = memoNavYear === cy && memoNavMonth === cm;
  }

  let html = `<div class="memo-view-nav">
    <button class="stats-nav-btn" onclick="memoNavStep(-1)">‹</button>
    <span style="font-size:14px;font-weight:700">${navLabel}</span>
    <button class="stats-nav-btn" onclick="memoNavStep(1)" ${atLatest?'disabled':''}>›</button>
  </div>`;

  // ── content ──
  if (memoViewMode === 'today') {
    html += renderMemoDayBlock(memoNavDay, true);
  } else if (memoViewMode === 'week') {
    const wk = getWeekOf(memoNavWeek).filter(d => d <= tod).reverse();
    let found = false;
    wk.forEach(date => {
      const block = renderMemoDayBlock(date, false);
      if (block) { html += block; found = true; }
    });
    if (!found) html += emptyMemoMsg();
  } else {
    const days = getMonthDates(memoNavYear, memoNavMonth).filter(d => d <= tod).reverse();
    let found = false;
    days.forEach(date => {
      const block = renderMemoDayBlock(date, false);
      if (block) { html += block; found = true; }
    });
    if (!found) html += emptyMemoMsg();
  }

  content.innerHTML = html;
}

function renderMemoDayBlock(date, showEmpty) {
  const dayData = memoCache[date] || {};
  const d = new Date(date + 'T00:00:00');
  const isToday = date === todayStr();
  const dayLabel = isToday ? '오늘' : `${d.getMonth()+1}/${d.getDate()}(${DAY_KO[d.getDay()]})`;

  const entries = tabs
    .map(tab => ({ tab, text: (dayData[tab.id] || '').trim() }))
    .filter(e => e.text);

  if (!showEmpty && entries.length === 0) return '';

  let html = `<div class="all-memo-item">
    <div style="font-size:11px;font-weight:700;color:var(--text-sub);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">${dayLabel}</div>`;

  if (entries.length === 0) {
    html += `<div style="font-size:13px;color:var(--text-sub);font-style:italic">메모 없음</div>`;
  } else {
    entries.forEach(({ tab, text }) => {
      html += `<div style="margin-bottom:10px">
        <div class="all-memo-tab-name">${tab.emoji||''} ${esc(tab.name)}</div>
        <div class="all-memo-text">${esc(text)}</div>
      </div>`;
    });
  }
  return html + '</div>';
}

function emptyMemoMsg() {
  return '<div style="text-align:center;color:var(--text-sub);padding:32px 16px">이 기간에 작성된 메모가 없습니다</div>';
}

async function saveRoutineSettings() {
  const name = document.getElementById('rs-name').value.trim();
  if (!name) { toast('루틴 이름을 입력하세요'); return; }
  const timeStart = document.getElementById('rs-start').value;
  const timeEnd = document.getElementById('rs-end').value;
  const update = { name };
  update.timeStart = timeStart || firebase.firestore.FieldValue.delete();
  update.timeEnd = timeEnd || firebase.firestore.FieldValue.delete();
  await col('routines').doc(settingRoutineId).update(update);
  closeModal('routine-settings-modal');
  toast('루틴 설정이 저장되었습니다');
}

async function moveRoutine(id, dir) {
  const tabRoutines = routines
    .filter(r => r.tabId === currentTabId)
    .sort((a,b) => (a.order||0) - (b.order||0));
  const idx = tabRoutines.findIndex(r => r.id === id);
  const swapIdx = idx + dir;
  if (swapIdx < 0 || swapIdx >= tabRoutines.length) return;
  const batch = db.batch();
  batch.update(col('routines').doc(tabRoutines[idx].id), { order: swapIdx });
  batch.update(col('routines').doc(tabRoutines[swapIdx].id), { order: idx });
  await batch.commit();
}

async function setGoal(id, current) {
  const input = prompt('주간 목표 횟수를 입력하세요 (1~7)\n7=매일, 5=주5회, 3=주3회 …', current);
  if (input === null) return;
  const n = parseInt(input);
  if (isNaN(n) || n < 1 || n > 7) { toast('1~7 사이 숫자를 입력하세요'); return; }
  await col('routines').doc(id).update({ goal: n });
  toast('목표가 설정되었습니다');
}

async function deleteRoutine(id) {
  await col('routines').doc(id).delete();
  // also clean up checks
  const dateSnap = await col('checks').get();
  const batch = db.batch();
  dateSnap.docs.forEach(doc => {
    if (doc.data()[id] !== undefined) {
      batch.update(doc.ref, { [id]: firebase.firestore.FieldValue.delete() });
    }
  });
  await batch.commit();
  toast('루틴이 삭제되었습니다');
}

function getMonthDates(year, month) {
  const last = new Date(year, month, 0).getDate();
  return Array.from({length: last}, (_, i) => `${year}-${p2(month)}-${p2(i+1)}`);
}

async function loadStatsForDates(dates) {
  const missing = dates.filter(d => statsCache[d] === undefined);
  if (missing.length === 0) return;
  await Promise.all(missing.map(async date => {
    const doc = await col('checks').doc(date).get();
    statsCache[date] = doc.exists ? (doc.data() || {}) : {};
  }));
}

async function openRoutineStats(routineId, routineName) {
  statsRoutineId = routineId;
  statsTab = 'week';
  statsWeekAnchor = viewDate;
  const [y, m] = todayStr().split('-').map(Number);
  statsMonthYear = y; statsMonthMonth = m;
  statsCache = {};

  document.getElementById('stats-title').textContent = routineName + ' 통계';
  document.getElementById('stab-week').classList.add('active');
  document.getElementById('stab-month').classList.remove('active');
  document.getElementById('stats-content').innerHTML = '<div style="text-align:center;padding:32px;color:var(--text-sub)">로딩 중…</div>';
  openModal('stats-modal');

  const allDates = [...new Set([...getWeekOf(statsWeekAnchor), ...getMonthDates(y, m)])];
  await loadStatsForDates(allDates);
  renderStatsContent();
}

async function switchStatsTab(tab) {
  statsTab = tab;
  document.getElementById('stab-week').classList.toggle('active', tab === 'week');
  document.getElementById('stab-month').classList.toggle('active', tab === 'month');
  document.getElementById('stats-content').innerHTML = '<div style="text-align:center;padding:32px;color:var(--text-sub)">로딩 중…</div>';
  if (tab === 'week') await loadStatsForDates(getWeekOf(statsWeekAnchor));
  else await loadStatsForDates(getMonthDates(statsMonthYear, statsMonthMonth));
  renderStatsContent();
}

async function statsNavWeek(dir) {
  const d = new Date(statsWeekAnchor + 'T00:00:00');
  d.setDate(d.getDate() + dir * 7);
  statsWeekAnchor = `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
  document.getElementById('stats-content').innerHTML = '<div style="text-align:center;padding:32px;color:var(--text-sub)">로딩 중…</div>';
  await loadStatsForDates(getWeekOf(statsWeekAnchor));
  renderStatsContent();
}

async function statsNavMonth(dir) {
  statsMonthMonth += dir;
  if (statsMonthMonth > 12) { statsMonthMonth = 1; statsMonthYear++; }
  if (statsMonthMonth < 1) { statsMonthMonth = 12; statsMonthYear--; }
  document.getElementById('stats-content').innerHTML = '<div style="text-align:center;padding:32px;color:var(--text-sub)">로딩 중…</div>';
  await loadStatsForDates(getMonthDates(statsMonthYear, statsMonthMonth));
  renderStatsContent();
}

function minsToTime(mins) { return `${p2(Math.floor(mins/60))}:${p2(mins%60)}`; }
function timeToMins(t) { const [h,m] = t.split(':').map(Number); return h*60+m; }

function renderStatsContent() {
  const rid = statsRoutineId;
  if (!rid) return;
  const tod = todayStr();
  const routine = routines.find(r => r.id === rid);

  // ── global summary stats (all cached dates, from createdAt onwards) ──
  const createdAt = routine?.createdAt || '2020-01-01';
  const allCachedDates = Object.keys(statsCache).sort().filter(d => d <= tod && d >= createdAt);
  let maxStreak = 0, cur = 0;
  allCachedDates.forEach(d => {
    if (statsCache[d][rid]) { cur++; if (cur > maxStreak) maxStreak = cur; } else cur = 0;
  });
  const allTimes = allCachedDates.map(d => statsCache[d][rid+'_t']).filter(Boolean);
  let avgTime = '–';
  if (allTimes.length > 0) {
    const avg = Math.round(allTimes.reduce((s,t) => s + timeToMins(t), 0) / allTimes.length);
    avgTime = minsToTime(avg);
  }

  let html = '';

  if (statsTab === 'week') {
    const weekDates = getWeekOf(statsWeekAnchor);
    const isCurrentWeek = weekDates.join(',') === getWeekOf(todayStr()).join(',');
    const weekStart = new Date(weekDates[0]+'T00:00:00');
    const weekEnd   = new Date(weekDates[6]+'T00:00:00');
    const weekLabel = isCurrentWeek ? '이번 주'
      : `${weekStart.getMonth()+1}/${weekStart.getDate()} ~ ${weekEnd.getMonth()+1}/${weekEnd.getDate()}`;

    html += `<div class="stats-nav-row">
      <button class="stats-nav-btn" onclick="statsNavWeek(-1)">‹</button>
      <span class="stats-nav-label">${weekLabel}</span>
      <button class="stats-nav-btn" onclick="statsNavWeek(1)" ${isCurrentWeek?'disabled':''}>›</button>
    </div>`;

    html += '<div class="stats-dots">';
    weekDates.forEach((date, idx) => {
      const isFuture = date > tod;
      const isToday = date === tod;
      const beforeStart = date < createdAt;
      const done = !isFuture && !beforeStart && statsCache[date]?.[rid];
      const d = new Date(date + 'T00:00:00');
      const cls = ['stats-dot-circle', done?'done':'', isToday?'today':'', (isFuture||beforeStart)?'future':''].join(' ');
      html += `<div class="stats-dot">
        <div class="stats-dot-lbl" style="font-weight:${isToday?700:500};color:${isToday?'var(--accent)':'var(--text-sub)'}">${DAY_MON[idx]}</div>
        <div class="${cls}" title="${beforeStart?'루틴 추가 전':''}"></div>
        <div class="stats-dot-lbl">${d.getDate()}</div>
      </div>`;
    });
    html += '</div>';

    const weekPast = weekDates.filter(d => d <= tod && d >= createdAt);
    const weekDone = weekPast.filter(d => statsCache[d]?.[rid]).length;
    const weekRate = weekPast.length > 0 ? Math.round(weekDone/weekPast.length*100) : 0;
    const weekTimes = weekPast.filter(d => statsCache[d]?.[rid]).map(d => statsCache[d][rid+'_t']).filter(Boolean);
    let weekAvg = '–';
    if (weekTimes.length > 0) {
      weekAvg = minsToTime(Math.round(weekTimes.reduce((s,t) => s+timeToMins(t),0)/weekTimes.length));
    }
    html += `<div style="text-align:center;font-size:13px;color:var(--text-sub);margin:6px 0 12px">달성률 <b style="color:var(--success)">${weekRate}%</b> (${weekDone}/${weekPast.length}일)&ensp;·&ensp;평균 완료 <b>${weekAvg}</b></div>`;

  } else {
    const year = statsMonthYear, month = statsMonthMonth;
    const tod2 = `${year}-${p2(month)}-99`;
    const firstDay = new Date(year, month-1, 1);
    const lastDay  = new Date(year, month, 0);
    const startOffset = firstDay.getDay() === 0 ? 6 : firstDay.getDay()-1;
    const [cy, cm] = todayStr().split('-').map(Number);
    const isCurrentMonth = year === cy && month === cm;
    const isPastLimit = year < cy - 1 || (year === cy - 1 && month < cm - 11);

    html += `<div class="stats-nav-row">
      <button class="stats-nav-btn" onclick="statsNavMonth(-1)" ${isPastLimit?'disabled':''}>‹</button>
      <span class="stats-nav-label">${year}년 ${month}월</span>
      <button class="stats-nav-btn" onclick="statsNavMonth(1)" ${isCurrentMonth?'disabled':''}>›</button>
    </div>`;

    html += '<div class="stats-calendar-hdr">' + ['월','화','수','목','금','토','일'].map(d =>
      `<div style="text-align:center;font-size:10px;color:var(--text-sub);padding:2px">${d}</div>`).join('') + '</div>';
    html += '<div class="stats-calendar">';
    for (let i = 0; i < startOffset; i++) html += '<div class="cal-day empty"></div>';
    for (let day = 1; day <= lastDay.getDate(); day++) {
      const dateStr = `${year}-${p2(month)}-${p2(day)}`;
      const isFuture = dateStr > tod;
      const isToday  = dateStr === tod;
      const beforeStart = dateStr < createdAt;
      const done = !isFuture && !beforeStart && statsCache[dateStr]?.[rid];
      const cls = 'cal-day '+(isFuture||beforeStart?'future':done?'done':'miss')+(isToday?' today-cal':'');
      const tip = beforeStart ? '루틴 추가 전' : dateStr;
      html += `<div class="${cls}" title="${tip}">${day}</div>`;
    }
    html += '</div>';

    const monthPast = getMonthDates(year, month).filter(d => d <= tod && d >= createdAt);
    const monthDone = monthPast.filter(d => statsCache[d]?.[rid]).length;
    const monthRate = monthPast.length > 0 ? Math.round(monthDone/monthPast.length*100) : 0;
    const monthTimes = monthPast.filter(d => statsCache[d]?.[rid]).map(d => statsCache[d][rid+'_t']).filter(Boolean);
    let monthAvg = '–';
    if (monthTimes.length > 0) {
      monthAvg = minsToTime(Math.round(monthTimes.reduce((s,t) => s+timeToMins(t),0)/monthTimes.length));
    }
    html += `<div style="text-align:center;font-size:13px;color:var(--text-sub);margin:8px 0 12px">달성률 <b style="color:var(--success)">${monthRate}%</b> (${monthDone}/${monthPast.length}일)&ensp;·&ensp;평균 완료 <b>${monthAvg}</b></div>`;
  }

  // ── summary strip ──
  html += `<div class="stats-summary">
    <div class="stat-item"><div class="stat-val">${maxStreak}일</div><div class="stat-lbl">최장 연속 달성</div></div>
    <div class="stat-item"><div class="stat-val" style="font-size:16px">${avgTime}</div><div class="stat-lbl">전체 평균 완료 시간</div></div>
  </div>`;

  // ── schedule vs actual (if set) ──
  if (routine?.timeStart && allTimes.length > 0) {
    const scheduled = timeToMins(routine.timeStart);
    const avgMins = Math.round(allTimes.reduce((s,t) => s+timeToMins(t),0)/allTimes.length);
    const diff = avgMins - scheduled;
    const diffLabel = diff === 0 ? '정시' : diff > 0 ? `${diff}분 늦게` : `${-diff}분 일찍`;
    const diffColor = diff === 0 ? 'var(--success)' : diff > 5 ? 'var(--danger)' : '#F59E0B';
    html += `<div class="schedule-compare" style="margin-top:10px">
      <div>
        <div class="sc-label">예정 시간</div>
        <div class="sc-val">${routine.timeStart}${routine.timeEnd ? ' ~ '+routine.timeEnd : ''}</div>
      </div>
      <div style="margin-left:auto;text-align:right">
        <div class="sc-label">평균 완료</div>
        <div class="sc-val" style="color:${diffColor}">${avgTime} <span style="font-size:11px;font-weight:500">(${diffLabel})</span></div>
      </div>
    </div>`;
  }

  document.getElementById('stats-content').innerHTML = html;
}

async function openTabStats(tab) {
  document.getElementById('tab-stats-title').textContent = `${tab.emoji||''} ${tab.name} 통계`;
  document.getElementById('tab-stats-content').innerHTML = '<div style="text-align:center;padding:32px;color:var(--text-sub)">로딩 중…</div>';
  openModal('tab-stats-modal');

  const tabRoutines = routines.filter(r => r.tabId === tab.id).sort((a,b) => (a.order||0)-(b.order||0));
  if (tabRoutines.length === 0) {
    document.getElementById('tab-stats-content').innerHTML = '<div style="padding:24px;color:var(--text-sub);text-align:center">루틴이 없습니다</div>';
    return;
  }

  const tod = todayStr();
  const [cy, cm] = tod.split('-').map(Number);

  // Load 60 days (covers ~8 weeks + current month)
  const dates60 = Array.from({length:60}, (_, i) => {
    const d = new Date(tod + 'T00:00:00');
    d.setDate(d.getDate() - (59-i));
    return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
  });
  const tc = {};
  await Promise.all(dates60.map(async date => {
    const doc = await col('checks').doc(date).get();
    tc[date] = doc.exists ? (doc.data()||{}) : {};
  }));

  const rRatio = (date, r) => tc[date]?.[r.id] ? 1 : 0;
  // Only count routines that existed on the given date (createdAt filter)
  const tabRatio = (date) => {
    const rs = tabRoutines.filter(r => !r.createdAt || r.createdAt <= date);
    return rs.length > 0 ? rs.reduce((s,r) => s+rRatio(date,r), 0) / rs.length : null;
  };

  let html = '';

  // ═══ 1. MONTHLY HEATMAP ═══
  const firstDay = new Date(cy, cm-1, 1);
  const lastDay  = new Date(cy, cm, 0);
  const startOffset = firstDay.getDay() === 0 ? 6 : firstDay.getDay()-1;

  html += `<div class="ts-section">
    <div class="ts-title">📅 이번 달 히트맵</div>
    <div class="stats-calendar-hdr">${['월','화','수','목','금','토','일'].map(d=>`<div style="text-align:center;font-size:10px;color:var(--text-sub)">${d}</div>`).join('')}</div>
    <div class="stats-calendar">`;
  for (let i=0;i<startOffset;i++) html+='<div class="cal-day empty"></div>';
  for (let day=1;day<=lastDay.getDate();day++) {
    const ds = `${cy}-${p2(cm)}-${p2(day)}`;
    const isFuture = ds > tod, isToday = ds === tod;
    const ratio = !isFuture ? tabRatio(ds) : -1;
    // null = no routines existed yet on this date → treat same as future (no data)
    const [bg,fg] = (ratio===null||ratio<0) ? ['var(--border)','var(--text-sub)']
      : ratio===0 ? ['#F3F4F6','#9CA3AF']
      : ratio<0.5 ? ['#A7F3D0','#065F46']
      : ratio<1   ? ['#34D399','#064E3B']
      :              ['#10B981','white'];
    const cnt = (ratio!==null&&ratio>=0) ? tabRoutines.filter(r=>(!r.createdAt||r.createdAt<=ds)&&tc[ds]?.[r.id]).length : 0;
    html += `<div class="cal-day" style="background:${bg};color:${fg};opacity:${isFuture?.4:1}${isToday?';outline:2px solid var(--accent);outline-offset:-1px':''}" title="${cnt}/${tabRoutines.length}">${day}</div>`;
  }
  html += `</div></div>`;

  // ═══ 2. WEEKDAY PATTERN ═══
  const wdAcc = Array(7).fill(null).map(()=>({sum:0,cnt:0}));
  dates60.filter(d=>d<=tod).forEach(ds => {
    const ratio = tabRatio(ds);
    if (ratio === null) return; // no routines existed yet
    const dow = new Date(ds+'T00:00:00').getDay();
    const idx = dow===0 ? 6 : dow-1;
    wdAcc[idx].sum += ratio;
    wdAcc[idx].cnt++;
  });
  const wdRates = wdAcc.map(w => w.cnt>0 ? w.sum/w.cnt : 0);
  const wdMax = Math.max(...wdRates, 0.001);
  const BAR_H = 60;

  html += `<div class="ts-section">
    <div class="ts-title">📊 요일별 패턴</div>
    <div style="display:flex;align-items:flex-end;gap:6px">`;
  DAY_MON.forEach((label,idx) => {
    const rate = wdRates[idx];
    const pct  = Math.round(rate*100);
    const barH = Math.max(rate>0?3:1, Math.round(rate/wdMax*BAR_H));
    const col  = pct>=80?'#10B981':pct>=50?'#F59E0B':'#EF4444';
    html += `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">
      <span style="font-size:9px;font-weight:700;color:${pct>0?col:'transparent'}">${pct}%</span>
      <div style="width:100%;height:${BAR_H}px;display:flex;align-items:flex-end">
        <div style="width:100%;height:${barH}px;background:${pct>0?col:'var(--border)'};border-radius:4px 4px 0 0"></div>
      </div>
      <span style="font-size:11px;color:var(--text-sub)">${label}</span>
    </div>`;
  });
  html += `</div></div>`;

  // ═══ 3. WEEKLY TREND (8 weeks) ═══
  const weeks = Array.from({length:8}, (_,w) => {
    const anchor = new Date(tod+'T00:00:00');
    anchor.setDate(anchor.getDate() - (7-w)*7);
    const anchorStr = `${anchor.getFullYear()}-${p2(anchor.getMonth()+1)}-${p2(anchor.getDate())}`;
    const wDates = getWeekOf(anchorStr);
    const past = wDates.filter(d => d<=tod && tc[d]!==undefined);
    const validPast = past.filter(d => tabRatio(d) !== null);
    const rate = validPast.length>0 ? validPast.reduce((s,d)=>s+tabRatio(d),0)/validPast.length : 0;
    const wStart = new Date(wDates[0]+'T00:00:00');
    return { label:`${wStart.getMonth()+1}/${wStart.getDate()}`, rate, past, isThis: w===7 };
  });
  const wMax = Math.max(...weeks.map(w=>w.rate), 0.001);

  html += `<div class="ts-section">
    <div class="ts-title">📈 주간 트렌드 <span style="font-weight:400;font-size:11px">(최근 8주)</span></div>
    <div style="display:flex;align-items:flex-end;gap:4px">`;
  weeks.forEach(w => {
    const pct  = Math.round(w.rate*100);
    const barH = Math.max(w.rate>0?3:1, Math.round(w.rate/wMax*BAR_H));
    const col  = pct>=80?'#10B981':pct>=50?'#F59E0B':pct>0?'#EF4444':'#E5E7EB';
    html += `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">
      <span style="font-size:9px;font-weight:700;color:${pct>0?col:'transparent'}">${pct}%</span>
      <div style="width:100%;height:${BAR_H}px;display:flex;align-items:flex-end">
        <div style="width:100%;height:${barH}px;background:${col};border-radius:4px 4px 0 0${w.isThis?';outline:2px solid var(--accent);outline-offset:1px':''}"></div>
      </div>
      <span style="font-size:9px;color:${w.isThis?'var(--accent)':'var(--text-sub)'};font-weight:${w.isThis?700:400}">${w.isThis?'이번주':w.label}</span>
    </div>`;
  });
  html += `</div></div>`;

  // ═══ 4. BEST / WORST ═══
  const monthDs = dates60.filter(d=>d.startsWith(`${cy}-${p2(cm)}`)&&d<=tod);
  const ranked = tabRoutines.map(r => {
    const validDs = monthDs.filter(d => !r.createdAt || r.createdAt <= d);
    const done = validDs.filter(d=>tc[d]?.[r.id]).length;
    return { r, pct: validDs.length>0 ? Math.round(done/validDs.length*100) : 0 };
  }).sort((a,b)=>b.pct-a.pct);

  html += `<div class="ts-section">
    <div class="ts-title">🏆 이번 달 루틴 순위</div>`;
  const medals = ['🥇','🥈','🥉'];
  ranked.forEach((item,i) => {
    const icon = medals[i] || `${i+1}위`;
    const col  = item.pct>=80?'#10B981':item.pct>=50?'#F59E0B':'#EF4444';
    html += `<div class="tab-stats-row">
      <span style="font-size:15px;flex-shrink:0;width:26px">${icon}</span>
      <span class="tab-stats-name">${esc(item.r.name)}</span>
      <div class="tab-stats-bar-wrap" style="width:70px"><div class="tab-stats-bar" style="width:${item.pct}%;background:${col}"></div></div>
      <span class="tab-stats-pct" style="color:${col}">${item.pct}%</span>
    </div>`;
  });
  html += `</div>`;

  // ═══ 5. TAB TIME ANALYSIS (only if tabTimeStart set) ═══
  if (tab.tabTimeStart) {
    const schStart = timeToMins(tab.tabTimeStart);
    const schEnd   = tab.tabTimeEnd ? timeToMins(tab.tabTimeEnd) : null;
    const schDur   = schEnd ? schEnd - schStart : null;

    // For each date with at least one check, compute session start/end/duration
    const sessions = [];
    dates60.filter(d => d <= tod).forEach(date => {
      const rs = tabRoutines.filter(r => !r.createdAt || r.createdAt <= date);
      const times = rs.map(r => tc[date]?.[r.id + '_t']).filter(Boolean).map(timeToMins);
      if (times.length === 0) return;
      const first = Math.min(...times), last = Math.max(...times);
      sessions.push({ date, first, last, dur: last - first });
    });

    if (sessions.length > 0) {
      const avgFirst = Math.round(sessions.reduce((s,x)=>s+x.first,0)/sessions.length);
      const avgLast  = schEnd ? Math.round(sessions.reduce((s,x)=>s+x.last,0)/sessions.length) : null;
      const avgDur   = Math.round(sessions.reduce((s,x)=>s+x.dur,0)/sessions.length);

      const startDiff  = avgFirst - schStart;
      const startLabel = startDiff === 0 ? '정시 시작' : startDiff > 0 ? `${startDiff}분 늦게 시작` : `${-startDiff}분 일찍 시작`;
      const startColor = startDiff <= 0 ? 'var(--success)' : startDiff <= 10 ? '#F59E0B' : 'var(--danger)';

      const onTimeStart = sessions.filter(x => x.first <= schStart + 10).length;
      const startRate   = Math.round(onTimeStart / sessions.length * 100);

      let endBlock = '';
      if (schEnd && avgLast !== null) {
        const endDiff  = avgLast - schEnd;
        const endLabel = endDiff <= 0 ? '목표 시간 내 완료' : `${endDiff}분 초과`;
        const endColor = endDiff <= 0 ? 'var(--success)' : endDiff <= 10 ? '#F59E0B' : 'var(--danger)';
        const onTimeEnd = sessions.filter(x => x.last <= schEnd + 5).length;
        const endRate   = Math.round(onTimeEnd / sessions.length * 100);
        endBlock = `
          <div class="time-stat-card">
            <div class="time-stat-label">평균 종료</div>
            <div class="time-stat-val" style="color:${endColor}">${minsToTime(avgLast)}</div>
            <div class="time-stat-sub" style="color:${endColor}">${endLabel}</div>
          </div>
          <div class="time-stat-card">
            <div class="time-stat-label">제시간 완료율</div>
            <div class="time-stat-val" style="color:${endRate>=80?'var(--success)':endRate>=50?'#F59E0B':'var(--danger)'}">${endRate}%</div>
            <div class="time-stat-sub">${onTimeEnd}/${sessions.length}일</div>
          </div>`;
      }

      const durLabel = schDur
        ? (avgDur <= schDur ? `목표보다 ${schDur - avgDur}분 빠름` : `목표보다 ${avgDur - schDur}분 초과`)
        : `평균 ${avgDur}분`;
      const durColor = schDur ? (avgDur <= schDur ? 'var(--success)' : '#F59E0B') : 'var(--text)';

      // Last 7 days detail
      const last7 = sessions.slice(-7);
      let detailRows = '';
      last7.forEach(s => {
        const d = new Date(s.date+'T00:00:00');
        const lbl = `${d.getMonth()+1}/${d.getDate()}(${DAY_KO[d.getDay()]})`;
        const late = s.first - schStart;
        const lateColor = late <= 0 ? 'var(--success)' : late <= 10 ? '#F59E0B' : 'var(--danger)';
        const lateTxt = late <= 0 ? `${-late}분 일찍` : `${late}분 늦게`;
        detailRows += `<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px">
          <span style="color:var(--text-sub)">${lbl}</span>
          <span style="font-family:'Courier New',monospace">${minsToTime(s.first)}${s.last!==s.first?' ~ '+minsToTime(s.last):''}</span>
          <span style="color:${lateColor};font-size:12px;font-weight:600">${lateTxt}</span>
        </div>`;
      });

      html += `<div class="ts-section" style="border-bottom:none">
        <div class="ts-title">⏰ 탭 시간 준수 분석</div>
        <div style="background:#F5F3FF;border-radius:10px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:8px">
          <span style="font-size:18px">🎯</span>
          <div>
            <div style="font-size:12px;color:#7C3AED;font-weight:600">목표 시간</div>
            <div style="font-size:14px;font-weight:700;color:#5B21B6">${tab.tabTimeStart}${tab.tabTimeEnd?' ~ '+tab.tabTimeEnd:''}${schDur?' ('+schDur+'분)':''}</div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
          <div class="time-stat-card">
            <div class="time-stat-label">평균 시작</div>
            <div class="time-stat-val" style="color:${startColor}">${minsToTime(avgFirst)}</div>
            <div class="time-stat-sub" style="color:${startColor}">${startLabel}</div>
          </div>
          <div class="time-stat-card">
            <div class="time-stat-label">제시간 시작율</div>
            <div class="time-stat-val" style="color:${startRate>=80?'var(--success)':startRate>=50?'#F59E0B':'var(--danger)'}">${startRate}%</div>
            <div class="time-stat-sub">${onTimeStart}/${sessions.length}일</div>
          </div>
          ${endBlock}
          <div class="time-stat-card">
            <div class="time-stat-label">평균 소요시간</div>
            <div class="time-stat-val" style="color:${durColor}">${avgDur}분</div>
            <div class="time-stat-sub" style="color:${durColor}">${durLabel}</div>
          </div>
        </div>
        <div style="font-size:12px;font-weight:600;color:var(--text-sub);margin-bottom:4px">최근 7일 상세</div>
        <div>${detailRows || '<div style="color:var(--text-sub);font-size:13px;padding:8px 0">데이터가 없습니다</div>'}</div>
      </div>`;
    } else {
      html += `<div class="ts-section" style="border-bottom:none">
        <div class="ts-title">⏰ 탭 시간 준수 분석</div>
        <div style="background:#F5F3FF;border-radius:10px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:8px">
          <span style="font-size:18px">🎯</span>
          <div>
            <div style="font-size:12px;color:#7C3AED;font-weight:600">목표 시간</div>
            <div style="font-size:14px;font-weight:700;color:#5B21B6">${tab.tabTimeStart}${tab.tabTimeEnd?' ~ '+tab.tabTimeEnd:''}</div>
          </div>
        </div>
        <div style="color:var(--text-sub);font-size:13px;padding:4px 0">루틴 완료 시간을 기록하면 분석 결과가 나타납니다</div>
      </div>`;
    }
  }

  document.getElementById('tab-stats-content').innerHTML = html;
}

// ═══════════════════════════════════════════
// START
// ═══════════════════════════════════════════
init();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/routine-tracker/sw.js');
  });
}
</script>
</body>
</html>
